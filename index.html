<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader X Academy</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0B0F1C;
  color:white;
}
.container{padding:20px;padding-bottom:80px}
h2{margin-top:0}
.card{
  background:#14182a;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button{
  flex:1;
  padding:15px;
  border:none;
  background:none;
  color:white;
  font-size:16px;
}
.lock{opacity:0.4}
.btn{
  background:#1f6fff;
  color:white;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}
.select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

// ================= INIT =================
if(!localStorage.getItem("role")){
  localStorage.setItem("role","free");
}
if(!localStorage.getItem("signals")){
  localStorage.setItem("signals", JSON.stringify([
    {type:"forex",pair:"XAUUSD BUY",entry:2350,tp:2380,sl:2330,premium:false},
    {type:"crypto",pair:"BTC BUY",entry:60000,tp:65000,sl:58000,premium:true},
    {type:"saham",pair:"BBCA BUY",entry:9000,tp:9500,sl:8800,premium:true}
  ]));
}

// ================= NAV =================
function nav(){
return `
<div class="nav">
<button onclick="dashboard()">🏠</button>
<button onclick="signal()">📊</button>
<button onclick="materi()">📘</button>
<button onclick="member()">👑</button>
</div>`;
}

// ================= DASHBOARD =================
function dashboard(){
app.innerHTML = `
<div class="container">
<h2>Trader X Academy</h2>

<div class="card">
🔥 Status: ${localStorage.getItem("role")}
</div>

<div class="card">
📊 Fokus: Forex / Crypto / Saham
</div>

<div class="card">
💰 Target: Profit Konsisten
</div>

</div>
${nav()}
`;
}

// ================= SIGNAL =================
function signal(){
let data = JSON.parse(localStorage.getItem("signals"));
let html = `<div class="container">
<h2>Signal</h2>

<select class="select" onchange="filterSignal(this.value)">
<option value="all">Semua</option>
<option value="forex">Forex</option>
<option value="crypto">Crypto</option>
<option value="saham">Saham</option>
</select>

<div id="signalList"></div>

<h3>Tambah Signal</h3>
<input id="pair" placeholder="Pair" class="select">
<input id="entry" placeholder="Entry" class="select">
<input id="tp" placeholder="TP" class="select">
<input id="sl" placeholder="SL" class="select">
<select id="type" class="select">
<option value="forex">Forex</option>
<option value="crypto">Crypto</option>
<option value="saham">Saham</option>
</select>
<label><input type="checkbox" id="premium"> Premium</label><br>
<button class="btn" onclick="addSignal()">Tambah</button>

</div>
${nav()}`;

app.innerHTML = html;
renderSignal(data);
}

function renderSignal(data){
let list = document.getElementById("signalList");
list.innerHTML="";

data.slice().reverse().forEach(s=>{
let lock = s.premium && localStorage.getItem("role")=="free";
list.innerHTML += `
<div class="card ${lock?'lock':''}">
<b>${lock?'🔒 Premium':s.pair}</b><br>
${lock?'':
`Entry: ${s.entry}<br>TP: ${s.tp}<br>SL: ${s.sl}`}
</div>`;
});
}

function filterSignal(type){
let data = JSON.parse(localStorage.getItem("signals"));
if(type!="all"){
  data = data.filter(s=>s.type==type);
}
renderSignal(data);
}

function addSignal(){
let data = JSON.parse(localStorage.getItem("signals"));
let newSignal = {
  pair:document.getElementById("pair").value,
  entry:document.getElementById("entry").value,
  tp:document.getElementById("tp").value,
  sl:document.getElementById("sl").value,
  type:document.getElementById("type").value,
  premium:document.getElementById("premium").checked
};
data.push(newSignal);
localStorage.setItem("signals", JSON.stringify(data));
alert("Signal ditambah!");
signal();
}

// ================= MATERI =================
function materi(){
app.innerHTML = `
<div class="container">
<h2>Materi</h2>

<div class="card">
📘 Dasar Trading
</div>

<div class="card lock">
🔒 Smart Money Concept
</div>

<div class="card lock">
🔒 Risk Management Pro
</div>

</div>
${nav()}
`;
}

// ================= MEMBER =================
function member(){
app.innerHTML = `
<div class="container">
<h2>Membership</h2>

<div class="card">
Status: ${localStorage.getItem("role")}
</div>

<button class="btn" onclick="upgrade()">Upgrade Premium</button>

</div>
${nav()}
`;
}

function upgrade(){
localStorage.setItem("role","premium");
alert("Sekarang lu Premium 😈");
member();
}

// ================= START =================
dashboard();

</script>

</body>
</html>
