<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader X Academy</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}
.container {
    padding: 20px;
}
.hidden { display: none; }
.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}
button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
    <h2>Trader X Academy</h2>
    <button onclick="loginGoogle()">Login dengan Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">
    <h2>Welcome <span id="userName"></span></h2>
    <p>Status: <span id="status"></span></p>

    <button onclick="upgrade()">Upgrade Premium 💎</button>

    <h3>📚 Materi</h3>
    <div id="materi"></div>

    <h3>📊 Signal</h3>
    <div id="signal"></div>

    <br>
    <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 GANTI DENGAN CONFIG LU
const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "ISI_PROJECT.firebaseapp.com",
  projectId: "ISI_PROJECT_ID",
  storageBucket: "ISI.appspot.com",
  messagingSenderId: "ISI",
  appId: "ISI"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser = null;

window.loginGoogle = async function() {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    currentUser = user;

    // cek database
    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    if(!snap.exists()){
        await setDoc(userRef, {
            name: user.displayName,
            email: user.email,
            status: "free"
        });
    }

    loadDashboard();
}

async function loadDashboard(){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    const userRef = doc(db, "users", currentUser.uid);
    const snap = await getDoc(userRef);
    const data = snap.data();

    document.getElementById("userName").innerText = data.name;
    document.getElementById("status").innerText = data.status;

    loadContent(data.status);
}

function loadContent(status){
    let materiDiv = document.getElementById("materi");
    let signalDiv = document.getElementById("signal");

    materiDiv.innerHTML = "";
    signalDiv.innerHTML = "";

    let materi = ["Basic Trading","Support & Resistance","Risk Management","Advanced Strategy"];

    materi.forEach((m, i) => {
        if(status === "free" && i > 1){
            materiDiv.innerHTML += `<div class="card">🔒 ${m}</div>`;
        } else {
            materiDiv.innerHTML += `<div class="card">✅ ${m}</div>`;
        }
    });

    let signals = ["XAUUSD BUY TP 2000 SL 1980","BTC SELL TP 60000 SL 62000"];

    signals.forEach((s, i) => {
        if(status === "free" && i > 0){
            signalDiv.innerHTML += `<div class="card">🔒 Premium</div>`;
        } else {
            signalDiv.innerHTML += `<div class="card">${s}</div>`;
        }
    });
}

window.upgrade = async function(){
    const userRef = doc(db, "users", currentUser.uid);
    await setDoc(userRef, { status: "premium" }, { merge: true });

    loadDashboard();
}

window.logout = function(){
    signOut(auth);
    location.reload();
}
</script>

</body>
</html>
