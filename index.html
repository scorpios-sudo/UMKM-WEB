<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader X Academy</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    padding: 20px;
}

.hidden {
    display: none;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

input {
    padding: 10px;
    width: 100%;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
    <h2>Trader X Academy</h2>
    <p>Login dulu bro 🔐</p>

    <input type="text" id="name" placeholder="Nama">
    <input type="email" id="email" placeholder="Email">

    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">
    <h2>Welcome <span id="userName"></span> 🚀</h2>
    <p>Status: <span id="status"></span></p>

    <button onclick="upgrade()">Upgrade Premium 💎</button>

    <h3>📚 Materi</h3>
    <div id="materi"></div>

    <h3>📊 Signal</h3>
    <div id="signal"></div>

    <br>
    <button onclick="logout()">Logout</button>
</div>

<script>
let user = {
    name: "",
    email: "",
    status: "free"
};

function login(){
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    if(name === "" || email === ""){
        alert("Isi dulu bro!");
        return;
    }

    user.name = name;
    user.email = email;

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("userName").innerText = user.name;
    document.getElementById("status").innerText = user.status;

    loadContent();
}

function loadContent(){
    let materiDiv = document.getElementById("materi");
    let signalDiv = document.getElementById("signal");

    materiDiv.innerHTML = "";
    signalDiv.innerHTML = "";

    // Materi
    let materi = [
        "Basic Trading",
        "Support & Resistance",
        "Risk Management",
        "Advanced Strategy"
    ];

    materi.forEach((m, i) => {
        if(user.status === "free" && i > 1){
            materiDiv.innerHTML += `<div class="card">🔒 ${m} (Premium)</div>`;
        } else {
            materiDiv.innerHTML += `<div class="card">✅ ${m}</div>`;
        }
    });

    // Signal
    let signals = [
        "XAUUSD BUY TP 2000 SL 1980",
        "BTC SELL TP 60000 SL 62000"
    ];

    signals.forEach((s, i) => {
        if(user.status === "free" && i > 0){
            signalDiv.innerHTML += `<div class="card">🔒 Premium Only</div>`;
        } else {
            signalDiv.innerHTML += `<div class="card">${s}</div>`;
        }
    });
}

function upgrade(){
    user.status = "premium";
    document.getElementById("status").innerText = user.status;
    loadContent();
}

function logout(){
    location.reload();
}
</script>

</body>
</html>
