<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader X Academy</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.container { padding:20px; }
.hidden { display:none; }

.card {
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    width:100%;
}

input {
    padding:10px;
    width:100%;
    margin-bottom:10px;
    border-radius:8px;
    border:none;
}

.nav {
    display:flex;
    justify-content:space-around;
    background:#020617;
    padding:10px;
    position:fixed;
    bottom:0;
    width:100%;
}

.nav button {
    background:none;
    color:white;
}

.header {
    font-size:18px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
    <h2>Trader X Academy 🚀</h2>
    <input type="text" id="name" placeholder="Nama">
    <input type="email" id="email" placeholder="Email">
    <button onclick="login()">Masuk</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

    <div class="container" id="home">
        <div class="header">Welcome <span id="userName"></span></div>
        <div class="card">Status: <span id="status"></span></div>
        <button onclick="upgrade()">Upgrade Premium 💎</button>
    </div>

    <div class="container hidden" id="materiPage">
        <h3>📚 Materi</h3>
        <div id="materi"></div>
    </div>

    <div class="container hidden" id="signalPage">
        <h3>📊 Signal</h3>
        <div id="signal"></div>
    </div>

    <div class="container hidden" id="profilePage">
        <h3>👤 Profile</h3>
        <div class="card" id="profile"></div>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- NAV -->
    <div class="nav">
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('materiPage')">Materi</button>
        <button onclick="showPage('signalPage')">Signal</button>
        <button onclick="showPage('profilePage')">Profile</button>
    </div>

</div>

<script>
// ===== USER =====
let user = JSON.parse(localStorage.getItem("user")) || null;

// ===== SIGNAL DATA =====
let signals = [
    {pair:"XAUUSD", type:"BUY", tp:"2000", sl:"1980", date:"2026-04-06 21:00"},
    {pair:"BTCUSD", type:"SELL", tp:"60000", sl:"62000", date:"2026-04-05 18:00"}
];

// ===== LOGIN =====
function login(){
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    if(!name || !email) return alert("Isi dulu bro!");

    user = {name, email, status:"free"};
    localStorage.setItem("user", JSON.stringify(user));

    loadApp();
}

// ===== LOAD APP =====
function loadApp(){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("userName").innerText = user.name;
    document.getElementById("status").innerText = user.status;

    document.getElementById("profile").innerHTML = `
        Nama: ${user.name}<br>
        Email: ${user.email}<br>
        Status: ${user.status}
    `;

    loadMateri();
    loadSignal();
}

// ===== MATERI =====
function loadMateri(){
    let materiDiv = document.getElementById("materi");
    materiDiv.innerHTML = "";

    let materi = ["Basic Trading","Support Resistance","Risk Management","Advanced Strategy"];

    materi.forEach((m,i)=>{
        if(user.status==="free" && i>1){
            materiDiv.innerHTML += `<div class="card">🔒 ${m}</div>`;
        } else {
            materiDiv.innerHTML += `<div class="card">✅ ${m}</div>`;
        }
    });
}

// ===== SIGNAL =====
function loadSignal(){
    let signalDiv = document.getElementById("signal");
    signalDiv.innerHTML = "";

    let sorted = signals.sort((a,b)=> new Date(b.date)-new Date(a.date));

    sorted.forEach((s,i)=>{
        if(user.status==="free" && i>1){
            signalDiv.innerHTML += `<div class="card">🔒 Premium</div>`;
        } else {
            signalDiv.innerHTML += `
            <div class="card">
                <b>${s.pair}</b> - ${s.type}<br>
                TP: ${s.tp} | SL: ${s.sl}<br>
                <small>${s.date}</small>
            </div>`;
        }
    });
}

// ===== NAVIGATION =====
function showPage(page){
    document.querySelectorAll(".container").forEach(p=>p.classList.add("hidden"));
    document.getElementById(page).classList.remove("hidden");
}

// ===== UPGRADE =====
function upgrade(){
    user.status = "premium";
    localStorage.setItem("user", JSON.stringify(user));
    loadApp();
}

// ===== LOGOUT =====
function logout(){
    localStorage.removeItem("user");
    location.reload();
}

// ===== AUTO LOAD =====
if(user){
    loadApp();
}
</script>

</body>
</html>
