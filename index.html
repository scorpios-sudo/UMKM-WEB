<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader X Academy</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0c0f1a;
  color:white;
}
.container{padding:20px}
input,button{
  padding:10px;
  margin:5px 0;
  width:100%;
  border:none;
  border-radius:8px;
}
button{
  background:#00ffcc;
  font-weight:bold;
}
.card{
  background:#14182a;
  padding:15px;
  border-radius:12px;
  margin:10px 0;
}
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button{
  flex:1;
  background:none;
  color:white;
}
.hidden{display:none}
.premium{color:gold}
</style>
</head>

<body>

<div id="app"></div>

<script>

// ================= LOGIN =================
function showLogin(){
  app.innerHTML = `
  <div class="container">
    <h2>Trader X Academy</h2>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>`;
}

function login(){
  let email = document.getElementById("email").value;
  localStorage.setItem("user", email);
  localStorage.setItem("role","free");
  showDashboard();
}

// ================= DASHBOARD =================
function showDashboard(){
  app.innerHTML = `
  <div class="container">
    <h3>Dashboard</h3>
    <p>Welcome ${localStorage.getItem("user")}</p>
    <p>Status: <span class="${localStorage.getItem("role")}">${localStorage.getItem("role")}</span></p>
  </div>
  ${nav()}
  `;
}

// ================= SIGNAL =================
let signals = [
  {type:"forex",pair:"XAUUSD BUY",entry:2350,tp:2380,sl:2330},
  {type:"crypto",pair:"BTC BUY",entry:60000,tp:65000,sl:58000},
  {type:"saham",pair:"BBCA BUY",entry:9000,tp:9500,sl:8800}
];

function showSignal(){
  let html = `<div class="container"><h3>Signal</h3>`;
  
  signals.reverse().forEach(s=>{
    html+=`
    <div class="card">
      <b>${s.pair}</b><br>
      Entry: ${s.entry}<br>
      TP: ${s.tp}<br>
      SL: ${s.sl}
    </div>`;
  });

  html+=`</div>`+nav();
  app.innerHTML = html;
}

// ================= MATERI =================
function showMateri(){
  app.innerHTML = `
  <div class="container">
    <h3>Materi</h3>

    <div class="card">
      <b>Basic Trading</b>
      <p>Belajar support resistance</p>
    </div>

    <div class="card">
      <b>Advanced</b>
      <p>Smart Money Concept</p>
    </div>

  </div>
  ${nav()}
  `;
}

// ================= MEMBER =================
function showMember(){
  app.innerHTML = `
  <div class="container">
    <h3>Membership</h3>
    <p>Status: ${localStorage.getItem("role")}</p>

    <button onclick="upgrade()">Upgrade Premium</button>
  </div>
  ${nav()}
  `;
}

function upgrade(){
  localStorage.setItem("role","premium");
  alert("Anda sekarang Premium!");
  showMember();
}

// ================= NAV =================
function nav(){
  return `
  <div class="nav">
    <button onclick="showDashboard()">Home</button>
    <button onclick="showSignal()">Signal</button>
    <button onclick="showMateri()">Materi</button>
    <button onclick="showMember()">Member</button>
  </div>`;
}

// INIT
if(localStorage.getItem("user")){
  showDashboard();
}else{
  showLogin();
}

</script>

</body>
</html>
