<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Trader X Academy | Platform Edukasi Forex, Crypto, Saham</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #000000;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      color: #F0F4F8;
      overflow-x: hidden;
    }

    /* custom scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #0F1219;
    }
    ::-webkit-scrollbar-thumb {
      background: #00E5A0;
      border-radius: 8px;
    }

    /* dark theme premium */
    :root {
      --bg-dark: #0A0D14;
      --card-bg: #12161F;
      --surface: #1A1F2A;
      --border: #2A2F3C;
      --accent: #00E5A0;
      --accent-glow: #00E5A080;
      --blue-neon: #2A6DFF;
      --danger: #FF4D6D;
      --warning: #FFB347;
      --text-secondary: #9AA4BF;
    }

    .app-container {
      max-width: 500px;
      margin: 0 auto;
      background: var(--bg-dark);
      min-height: 100vh;
      position: relative;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    /* header */
    .app-header {
      padding: 20px 20px 8px 20px;
      background: var(--bg-dark);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFFFFF, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .logo span {
      font-size: 0.8rem;
      background: none;
      -webkit-background-clip: unset;
      color: var(--accent);
    }

    /* bottom navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 500px;
      margin: 0 auto;
      background: rgba(18, 22, 31, 0.96);
      backdrop-filter: blur(16px);
      display: flex;
      justify-content: space-around;
      padding: 10px 16px 22px;
      border-top: 1px solid var(--border);
      z-index: 20;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      padding: 6px 12px;
      border-radius: 40px;
    }
    .nav-item.active {
      color: var(--accent);
      background: rgba(0, 229, 160, 0.12);
    }
    .nav-icon {
      font-size: 1.5rem;
    }

    /* content */
    .main-content {
      padding: 20px 16px 80px 16px;
    }

    /* card UI */
    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 20px 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: transform 0.2s ease, box-shadow 0.2s;
    }
    .card:active {
      transform: scale(0.98);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-weight: 600;
      color: var(--accent);
    }
    .badge {
      background: #1E2A3A;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-free { background: #1E3A2A; color: var(--accent); }
    .badge-premium { background: linear-gradient(135deg, #FFB347, #FF8C00); color: #0A0D14; }

    /* button */
    .btn {
      border: none;
      padding: 12px 18px;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
      background: var(--surface);
      color: white;
    }
    .btn-primary {
      background: var(--accent);
      color: #0A0D14;
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .btn-primary:active { transform: scale(0.96); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .btn-danger {
      background: var(--danger);
      color: white;
    }

    /* form */
    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: white;
      font-size: 0.9rem;
      margin: 8px 0;
      transition: 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-left: 8px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* signal item */
    .signal-item {
      background: var(--surface);
      border-radius: 24px;
      padding: 14px;
      margin-bottom: 12px;
      border-left: 4px solid var(--accent);
    }
    .signal-premium-locked {
      opacity: 0.6;
      filter: blur(0.8px);
      pointer-events: none;
    }
    /* modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-content {
      background: var(--card-bg);
      max-width: 340px;
      width: 90%;
      border-radius: 32px;
      padding: 24px;
      border: 1px solid var(--accent);
      max-height: 80vh;
      overflow-y: auto;
    }
    .toast-notif {
      position: fixed;
      bottom: 80px;
      left: 20px;
      right: 20px;
      max-width: 460px;
      margin: 0 auto;
      background: #1E2A3A;
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      border-radius: 60px;
      text-align: center;
      color: var(--accent);
      font-weight: 600;
      z-index: 150;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
    }
    .toast-notif.show {
      opacity: 1;
      bottom: 100px;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mt-2 { margin-top: 8px; }
    .mb-2 { margin-bottom: 8px; }
    .text-accent { color: var(--accent); }
    .text-danger { color: var(--danger); }
  </style>
</head>
<body>
<div class="app-container" id="appRoot">
  <div class="app-header">
    <div class="logo">TRADER X ACADEMY <span>⚡</span></div>
    <div style="font-size: 0.7rem; color: var(--accent);">Edukasi • Signal • Kalkulator</div>
  </div>
  <div class="main-content" id="mainContent"></div>
  <div class="bottom-nav" id="bottomNav"></div>
</div>
<div id="toastMsg" class="toast-notif">✨ Notifikasi</div>

<!-- MODAL LOGIN -->
<div id="loginModal" class="modal-overlay">
  <div class="modal-content">
    <h3 style="margin-bottom: 16px;">🔐 Masuk ke Trader X</h3>
    <input type="email" id="loginEmail" placeholder="Email" value="demo@traderx.com">
    <input type="password" id="loginPassword" placeholder="Password" value="123456">
    <button class="btn btn-primary" id="doLoginBtn" style="margin-top: 12px;">Login</button>
    <p style="text-align:center; margin-top:12px;">Belum punya akun? <span id="showRegisterBtn" style="color:var(--accent); cursor:pointer;">Daftar</span></p>
  </div>
</div>

<!-- MODAL REGISTER -->
<div id="registerModal" class="modal-overlay">
  <div class="modal-content">
    <h3>📝 Daftar Akun</h3>
    <input type="text" id="regName" placeholder="Nama Lengkap">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Password">
    <button class="btn btn-primary" id="doRegisterBtn">Daftar</button>
    <p style="text-align:center; margin-top:12px;">Sudah punya akun? <span id="showLoginFromReg" style="color:var(--accent); cursor:pointer;">Login</span></p>
  </div>
</div>

<!-- MODAL EDIT PROFILE -->
<div id="editProfileModal" class="modal-overlay">
  <div class="modal-content">
    <h3>✏️ Edit Profil</h3>
    <input type="text" id="editName" placeholder="Nama">
    <button class="btn btn-primary" id="saveProfileBtn">Simpan Perubahan</button>
    <button class="btn btn-outline" id="closeProfileModal" style="margin-top:8px;">Batal</button>
  </div>
</div>

<!-- MODAL ADD SIGNAL (simulasi admin) -->
<div id="addSignalModal" class="modal-overlay">
  <div class="modal-content">
    <h3>➕ Tambah Signal Baru</h3>
    <input type="text" id="signalPair" placeholder="Pair (contoh: BTC/USD)" value="ETH/USD">
    <input type="text" id="signalEntry" placeholder="Entry" value="3200">
    <input type="text" id="signalSL" placeholder="Stop Loss" value="3100">
    <input type="text" id="signalTP" placeholder="Take Profit" value="3400">
    <select id="signalType">
      <option value="FREE">FREE</option>
      <option value="PREMIUM">PREMIUM</option>
    </select>
    <button class="btn btn-primary" id="confirmAddSignal">Tambah Signal</button>
    <button class="btn btn-outline" id="closeSignalModal">Batal</button>
  </div>
</div>

<!-- MODAL EDUKASI DETAIL -->
<div id="eduModal" class="modal-overlay">
  <div class="modal-content">
    <h3 id="eduTitle">Materi</h3>
    <p id="eduDesc"></p>
    <button class="btn btn-outline" id="closeEduModal">Tutup</button>
  </div>
</div>

<script>
  // ---------- DATA STORE ----------
  let currentUser = null; // { name, email, isPremium, password }
  let users = [];
  let signals = [];
  let journals = [];

  // load localStorage
  function loadStorage() {
    const storedUsers = localStorage.getItem('traderx_users');
    if(storedUsers) users = JSON.parse(storedUsers);
    else {
      users = [{ name: "Trader Pro", email: "demo@traderx.com", password: "123456", isPremium: false }];
      localStorage.setItem('traderx_users', JSON.stringify(users));
    }
    const storedSignals = localStorage.getItem('traderx_signals');
    if(storedSignals) signals = JSON.parse(storedSignals);
    else {
      signals = [
        { id: 1, pair: "BTC/USD", entry: "68500", sl: "67000", tp: "71000", type: "FREE", direction: "BUY", date: new Date().toISOString() },
        { id: 2, pair: "XAU/USD", entry: "2320", sl: "2305", tp: "2350", type: "PREMIUM", direction: "BUY", date: new Date().toISOString() },
        { id: 3, pair: "EUR/USD", entry: "1.0920", sl: "1.0880", tp: "1.0980", type: "FREE", direction: "SELL", date: new Date().toISOString() }
      ];
      localStorage.setItem('traderx_signals', JSON.stringify(signals));
    }
    const storedJournals = localStorage.getItem('traderx_journals');
    if(storedJournals) journals = JSON.parse(storedJournals);
    else journals = [];
    // cek session
    const sess = localStorage.getItem('traderx_session');
    if(sess) {
      try {
        currentUser = JSON.parse(sess);
      } catch(e) {}
    }
  }
  function saveUsers() { localStorage.setItem('traderx_users', JSON.stringify(users)); }
  function saveSignals() { localStorage.setItem('traderx_signals', JSON.stringify(signals)); }
  function saveJournals() { localStorage.setItem('traderx_journals', JSON.stringify(journals)); }
  function saveSession() { if(currentUser) localStorage.setItem('traderx_session', JSON.stringify(currentUser)); else localStorage.removeItem('traderx_session'); }

  // Helper notifikasi
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.style.background = isError ? '#4A1E2A' : '#1E3A2A';
    toast.style.color = isError ? '#FF8A9F' : '#00E5A0';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // RENDER MAIN berdasarkan tab
  let currentTab = 'home';

  function renderApp() {
    if(!currentUser) {
      // Tampilkan layar login/register
      document.getElementById('mainContent').innerHTML = `
        <div class="card" style="text-align:center; margin-top: 40px;">
          <h2>🚀 Trader X Academy</h2>
          <p style="margin: 12px 0;">Platform edukasi & sinyal trading profesional</p>
          <button class="btn btn-primary" id="openLoginFromLanding">Masuk ke Akun</button>
          <button class="btn btn-outline" id="openRegisterFromLanding" style="margin-top:12px;">Daftar Baru</button>
        </div>
      `;
      document.getElementById('bottomNav').innerHTML = '';
      document.getElementById('openLoginFromLanding')?.addEventListener('click', () => openLoginModal());
      document.getElementById('openRegisterFromLanding')?.addEventListener('click', () => openRegisterModal());
      return;
    }
    // render bottom nav
    const navHtml = `
      <button class="nav-item ${currentTab === 'home' ? 'active' : ''}" data-tab="home"><span class="nav-icon">🏠</span><span>Home</span></button>
      <button class="nav-item ${currentTab === 'signal' ? 'active' : ''}" data-tab="signal"><span class="nav-icon">📡</span><span>Signal</span></button>
      <button class="nav-item ${currentTab === 'calculator' ? 'active' : ''}" data-tab="calculator"><span class="nav-icon">🧮</span><span>Kalkulator</span></button>
      <button class="nav-item ${currentTab === 'journal' ? 'active' : ''}" data-tab="journal"><span class="nav-icon">📓</span><span>Journal</span></button>
      <button class="nav-item ${currentTab === 'profile' ? 'active' : ''}" data-tab="profile"><span class="nav-icon">👤</span><span>Profil</span></button>
    `;
    document.getElementById('bottomNav').innerHTML = navHtml;
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', (e) => {
        currentTab = btn.dataset.tab;
        renderApp();
      });
    });
    // render konten berdasarkan tab
    if(currentTab === 'home') renderHome();
    else if(currentTab === 'signal') renderSignal();
    else if(currentTab === 'calculator') renderCalculator();
    else if(currentTab === 'journal') renderJournal();
    else if(currentTab === 'profile') renderProfile();
  }

  // HOME + dashboard menu
  function renderHome() {
    let html = `<div class="card"><div class="flex-between"><span>👋 Welcome, ${currentUser.name}</span><span class="badge ${currentUser.isPremium ? 'badge-premium' : 'badge-free'}">${currentUser.isPremium ? 'PREMIUM' : 'FREE'}</span></div><p style="margin-top:8px;">Tingkatkan tradingmu dengan alat profesional.</p></div>`;
    html += `<div class="grid-2">`;
    const menus = [
      { icon: "📡", name: "Signal Trading", tab: "signal" },
      { icon: "🧮", name: "Forex Calculator", tab: "calculator" },
      { icon: "📓", name: "Trading Journal", tab: "journal" },
      { icon: "📘", name: "Edukasi", tab: "edu" },
      { icon: "👑", name: "Membership", tab: "membership" },
      { icon: "⚙️", name: "Profile", tab: "profile" }
    ];
    menus.forEach(menu => {
      html += `<div class="card" style="cursor:pointer; text-align:center" data-menu="${menu.tab}"><div style="font-size:2rem;">${menu.icon}</div><div>${menu.name}</div></div>`;
    });
    html += `</div><div class="card"><div class="card-header">📊 Stat Cepat</div><div class="flex-between"><span>Total Trade</span><span>${journals.length}</span></div><div class="flex-between"><span>Winrate</span><span>${calculateWinRate()}%</span></div><div class="flex-between"><span>Profit / Loss</span><span class="${getTotalPnL()>=0?'text-accent':'text-danger'}">$${getTotalPnL().toFixed(2)}</span></div></div>`;
    document.getElementById('mainContent').innerHTML = html;
    document.querySelectorAll('[data-menu]').forEach(el => {
      el.addEventListener('click', (e) => {
        const target = el.dataset.menu;
        if(target === 'edu') renderEdukasi();
        else if(target === 'membership') renderMembership();
        else if(target === 'profile') { currentTab = 'profile'; renderApp(); }
        else if(target === 'signal') { currentTab = 'signal'; renderApp(); }
        else if(target === 'calculator') { currentTab = 'calculator'; renderApp(); }
        else if(target === 'journal') { currentTab = 'journal'; renderApp(); }
        else showToast("Menu sedang dikembangkan", false);
      });
    });
  }

  function calculateWinRate() {
    if(journals.length === 0) return 0;
    const wins = journals.filter(j => j.result === 'Win').length;
    return Math.round((wins / journals.length)*100);
  }
  function getTotalPnL() {
    return journals.reduce((sum, j) => sum + (j.profitLoss || 0), 0);
  }

  // SIGNAL
  function renderSignal() {
    let html = `<div class="card"><div class="flex-between"><span>📡 Live Signal Trading</span><button id="addSignalBtnAdmin" class="badge" style="background:#2A3A5A;">+ Add Signal</button></div></div>`;
    const sorted = [...signals].reverse();
    sorted.forEach(sig => {
      const isLocked = (sig.type === 'PREMIUM' && !currentUser.isPremium);
      html += `<div class="signal-item ${isLocked ? 'signal-premium-locked' : ''}">
        <div class="flex-between"><strong>${sig.pair}</strong> <span class="badge ${sig.type === 'FREE' ? 'badge-free' : 'badge-premium'}">${sig.type}</span></div>
        <div>📈 Entry: ${sig.entry} | 🛑 SL: ${sig.sl} | 🎯 TP: ${sig.tp}</div>
        ${isLocked ? '<div style="color:#FFB347;">🔒 Upgrade ke Premium untuk akses sinyal ini</div>' : '<button class="btn btn-outline btn-small copy-signal" style="margin-top:8px; padding:6px;">Copy Signal</button>'}
      </div>`;
    });
    document.getElementById('mainContent').innerHTML = html;
    document.getElementById('addSignalBtnAdmin')?.addEventListener('click', () => openAddSignalModal());
    document.querySelectorAll('.copy-signal').forEach(btn => {
      btn.addEventListener('click', () => showToast("Signal disalin ke clipboard (simulasi)", false));
    });
  }

  // FOREX CALCULATOR (Lengkap dengan step & monthly)
  function renderCalculator() {
    const html = `
      <div class="card"><div class="card-header">📊 Professional Risk Calculator</div>
        <label>Account Balance ($)</label><input type="number" id="calcBalance" value="10000" step="100">
        <label>Risk %</label><input type="number" id="calcRiskPercent" value="2" step="0.5">
        <label>Risk Reward Ratio</label><select id="calcRR"><option>1:2</option><option>1:3</option><option>1:4</option></select>
        <label>Stop Loss (pips)</label><input type="number" id="calcSLpips" value="20">
        <label>Jumlah Step (compounding)</label><input type="number" id="calcSteps" value="5">
        <button class="btn btn-primary" id="calcBtn">Hitung Sekarang</button>
        <div id="calcResult" class="mt-2"></div>
        <div id="calcDetail" class="mt-2"></div>
        <div id="calcMonthly" class="mt-2"></div>
        <div id="calcTips" class="mt-2" style="background:#1A2A2A; border-radius:20px; padding:12px;"></div>
      </div>
    `;
    document.getElementById('mainContent').innerHTML = html;
    document.getElementById('calcBtn').addEventListener('click', () => {
      const balance = parseFloat(document.getElementById('calcBalance').value);
      const riskPercent = parseFloat(document.getElementById('calcRiskPercent').value);
      const rrRaw = document.getElementById('calcRR').value;
      const rr = parseFloat(rrRaw.split(':')[1]);
      const slPips = parseFloat(document.getElementById('calcSLpips').value);
      const steps = parseInt(document.getElementById('calcSteps').value);
      if(isNaN(balance) || isNaN(riskPercent) || isNaN(slPips)) return;
      const riskAmount = balance * (riskPercent/100);
      const pipValue = 10; // standar 1 lot = $10 per pip
      let lotSize = riskAmount / (slPips * pipValue);
      lotSize = Math.max(0.01, Math.min(50, lotSize));
      const netStopLoss = slPips * pipValue * lotSize;
      const netTakeProfit = netStopLoss * rr;
      const profitPerStep = netTakeProfit;
      let compounded = balance;
      let stepDetails = [];
      for(let i=1;i<=steps;i++) {
        compounded += profitPerStep;
        stepDetails.push(`Step ${i}: +$${profitPerStep.toFixed(2)} → $${compounded.toFixed(2)}`);
      }
      const monthlyProjection = compounded - balance;
      document.getElementById('calcResult').innerHTML = `<div class="flex-between"><span>💰 Amount at Risk:</span><span>$${riskAmount.toFixed(2)}</span></div>
      <div class="flex-between"><span>📐 Pip Value:</span><span>$${pipValue.toFixed(2)} / lot</span></div>
      <div class="flex-between"><span>⚖️ Lot Size:</span><span>${lotSize.toFixed(3)}</span></div>
      <div class="flex-between"><span>🛑 Net Stop Loss:</span><span>$${netStopLoss.toFixed(2)}</span></div>
      <div class="flex-between"><span>🎯 Net Take Profit:</span><span>$${netTakeProfit.toFixed(2)}</span></div>`;
      document.getElementById('calcDetail').innerHTML = `<strong>📈 Profit Step (Compounding)</strong><br>${stepDetails.join('<br>')}`;
      document.getElementById('calcMonthly').innerHTML = `<strong>📅 Monthly Projection (${steps} trades win beruntun):</strong><br>💰 Profit: +$${monthlyProjection.toFixed(2)} | New Balance: $${compounded.toFixed(2)}`;
      let tips = "💡 Tips: Gunakan risk 1-2% per trade, jaga disiplin.";
      if(riskPercent > 3) tips = "⚠️ Risk di atas 3% cukup tinggi, pertimbangkan kembali.";
      if(lotSize < 0.05) tips = "🔍 Lot kecil aman untuk pemula, fokus konsistensi.";
      document.getElementById('calcTips').innerHTML = tips;
    });
  }

  // TRADING JOURNAL
  function renderJournal() {
    let html = `<div class="card"><div class="card-header">📓 Trading Journal</div>
      <input type="text" id="journalPair" placeholder="Pair (EUR/USD, BTC/USD)">
      <input type="number" id="journalEntry" placeholder="Entry Price">
      <input type="number" id="journalSL" placeholder="Stop Loss">
      <input type="number" id="journalTP" placeholder="Take Profit">
      <input type="number" id="journalProfit" placeholder="Profit/Loss ($)">
      <select id="journalResult"><option>Win</option><option>Loss</option></select>
      <button class="btn btn-primary" id="addJournalBtn">+ Tambah Trade</button>
      <hr style="margin:16px 0;">
      <div id="journalList"></div>
    </div>`;
    document.getElementById('mainContent').innerHTML = html;
    function refreshJournalList() {
      let listHtml = `<div class="flex-between"><span>Total Trade: ${journals.length}</span><span>Winrate: ${calculateWinRate()}%</span><span>Total P&L: $${getTotalPnL().toFixed(2)}</span></div>`;
      journals.slice().reverse().forEach(j => {
        listHtml += `<div class="signal-item" style="margin-top:8px;"><div class="flex-between"><strong>${j.pair}</strong> <span class="${j.result === 'Win' ? 'text-accent' : 'text-danger'}">${j.result} $${j.profitLoss}</span></div><div>Entry: ${j.entry} | SL: ${j.sl} | TP: ${j.tp}</div></div>`;
      });
      document.getElementById('journalList').innerHTML = listHtml;
    }
    document.getElementById('addJournalBtn').addEventListener('click', () => {
      const pair = document.getElementById('journalPair').value.trim();
      const entry = parseFloat(document.getElementById('journalEntry').value);
      const sl = parseFloat(document.getElementById('journalSL').value);
      const tp = parseFloat(document.getElementById('journalTP').value);
      const profitLoss = parseFloat(document.getElementById('journalProfit').value);
      const result = document.getElementById('journalResult').value;
      if(!pair || isNaN(entry)) { showToast("Isi pair dan entry", true); return; }
      journals.push({ id: Date.now(), pair, entry, sl, tp, profitLoss, result, date: new Date().toISOString() });
      saveJournals();
      refreshJournalList();
      document.getElementById('journalPair').value = '';
      document.getElementById('journalEntry').value = '';
      document.getElementById('journalSL').value = '';
      document.getElementById('journalTP').value = '';
      document.getElementById('journalProfit').value = '';
      showToast("Trade tersimpan!", false);
    });
    refreshJournalList();
  }

  // EDUKASI
  const edukasiData = {
    "Forex": "Forex adalah pasar valuta asing. Pelajari analisa teknikal & fundamental. Pair mayor: EUR/USD, GBP/USD.",
    "Crypto": "Bitcoin, Ethereum, Altcoin. Volatilitas tinggi, gunakan risk management ketat.",
    "Saham": "Investasi saham jangka panjang. Analisa laporan keuangan & sentimen pasar."
  };
  function renderEdukasi() {
    let html = `<div class="card"><div class="card-header">📚 Pusat Edukasi</div>`;
    for(let [key, desc] of Object.entries(edukasiData)) {
      html += `<div class="signal-item" data-edu="${key}" style="cursor:pointer;"><strong>📖 ${key}</strong><p>${desc.substring(0,60)}...</p></div>`;
    }
    html += `</div>`;
    document.getElementById('mainContent').innerHTML = html;
    document.querySelectorAll('[data-edu]').forEach(el => {
      el.addEventListener('click', () => {
        const title = el.dataset.edu;
        document.getElementById('eduTitle').innerText = title;
        document.getElementById('eduDesc').innerText = edukasiData[title];
        document.getElementById('eduModal').classList.add('active');
      });
    });
    document.getElementById('closeEduModal').onclick = () => document.getElementById('eduModal').classList.remove('active');
  }

  // MEMBERSHIP
  function renderMembership() {
    const html = `<div class="card"><div class="card-header">👑 Membership Plan</div>
      <div class="flex-between"><span>Status saat ini:</span><span class="badge ${currentUser.isPremium ? 'badge-premium' : 'badge-free'}">${currentUser.isPremium ? 'PREMIUM' : 'FREE'}</span></div>
      <div style="background:#1A1F2A; border-radius:24px; padding:16px; margin-top:12px;">
        <h3>✨ Premium Features</h3>
        <li>✅ Akses semua sinyal PREMIUM</li>
        <li>✅ Materi eksklusif & webinar</li>
        <li>✅ Kalkulator lanjutan</li>
        <li>✅ Support prioritas</li>
      </div>
      ${!currentUser.isPremium ? '<button class="btn btn-primary" id="upgradePremiumBtn" style="margin-top:20px;">Upgrade ke Premium (Simulasi)</button>' : '<p class="text-accent">Terima kasih telah menjadi member Premium!</p>'}
    </div>`;
    document.getElementById('mainContent').innerHTML = html;
    document.getElementById('upgradePremiumBtn')?.addEventListener('click', () => {
      currentUser.isPremium = true;
      const index = users.findIndex(u => u.email === currentUser.email);
      if(index !== -1) users[index].isPremium = true;
      saveUsers();
      saveSession();
      showToast("✅ Akun Premium aktif! Akses semua sinyal.", false);
      renderApp();
    });
  }

  // PROFILE
  function renderProfile() {
    const html = `<div class="card"><div class="card-header">👤 Profil Saya</div>
      <div><strong>Nama:</strong> ${currentUser.name}</div>
      <div><strong>Email:</strong> ${currentUser.email}</div>
      <div><strong>Tipe Akun:</strong> ${currentUser.isPremium ? 'Premium' : 'Free'}</div>
      <button class="btn btn-outline" id="editProfileBtn" style="margin-top:16px;">✏️ Edit Nama</button>
      <button class="btn btn-danger" id="logoutBtn" style="margin-top:12px;">🚪 Logout</button>
    </div>`;
    document.getElementById('mainContent').innerHTML = html;
    document.getElementById('editProfileBtn').addEventListener('click', () => {
      document.getElementById('editName').value = currentUser.name;
      document.getElementById('editProfileModal').classList.add('active');
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      currentUser = null;
      localStorage.removeItem('traderx_session');
      renderApp();
      showToast("Anda telah logout", false);
    });
    document.getElementById('saveProfileBtn').onclick = () => {
      const newName = document.getElementById('editName').value.trim();
      if(newName) {
        currentUser.name = newName;
        const idx = users.findIndex(u => u.email === currentUser.email);
        if(idx !== -1) users[idx].name = newName;
        saveUsers();
        saveSession();
        showToast("Nama berhasil diupdate");
        renderApp();
        document.getElementById('editProfileModal').classList.remove('active');
      }
    };
    document.getElementById('closeProfileModal').onclick = () => document.getElementById('editProfileModal').classList.remove('active');
  }

  // MODAL LOGIC
  function openLoginModal() { document.getElementById('loginModal').classList.add('active'); }
  function openRegisterModal() { document.getElementById('registerModal').classList.add('active'); }
  function openAddSignalModal() { document.getElementById('addSignalModal').classList.add('active'); }

  document.getElementById('doLoginBtn')?.addEventListener('click', () => {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    const user = users.find(u => u.email === email && u.password === pass);
    if(user) {
      currentUser = { ...user };
      saveSession();
      document.getElementById('loginModal').classList.remove('active');
      renderApp();
      showToast(`Selamat datang, ${currentUser.name}`);
    } else showToast("Email atau password salah", true);
  });
  document.getElementById('doRegisterBtn')?.addEventListener('click', () => {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    if(!name || !email || !pass) { showToast("Semua harus diisi", true); return; }
    if(users.find(u=> u.email === email)) { showToast("Email sudah terdaftar", true); return; }
    const newUser = { name, email, password: pass, isPremium: false };
    users.push(newUser);
    saveUsers();
    currentUser = { ...newUser };
    saveSession();
    document.getElementById('registerModal').classList.remove('active');
    renderApp();
    showToast("Registrasi berhasil! Selamat datang.");
  });
  document.getElementById('showRegisterBtn')?.addEventListener('click', () => { document.getElementById('loginModal').classList.remove('active'); openRegisterModal(); });
  document.getElementById('showLoginFromReg')?.addEventListener('click', () => { document.getElementById('registerModal').classList.remove('active'); openLoginModal(); });
  document.getElementById('closeSignalModal')?.addEventListener('click', () => document.getElementById('addSignalModal').classList.remove('active'));
  document.getElementById('confirmAddSignal')?.addEventListener('click', () => {
    const pair = document.getElementById('signalPair').value;
    const entry = document.getElementById('signalEntry').value;
    const sl = document.getElementById('signalSL').value;
    const tp = document.getElementById('signalTP').value;
    const type = document.getElementById('signalType').value;
    if(pair && entry) {
      signals.push({ id: Date.now(), pair, entry, sl, tp, type, direction: "BUY", date: new Date().toISOString() });
      saveSignals();
      showToast("Signal baru ditambahkan!");
      document.getElementById('addSignalModal').classList.remove('active');
      if(currentTab === 'signal') renderSignal();
    } else showToast("Lengkapi data", true);
  });

  // init
  loadStorage();
  renderApp();
</script>
</body>
</html>
