<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader X Academy</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0B0F1C;
  color:white;
}
.container{padding:20px; padding-bottom:80px}
.hidden{display:none}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button{
  flex:1;
  background:none;
  color:white;
  border:none;
  padding:15px;
}

.card{
  background:#14182a;
  padding:15px;
  border-radius:12px;
  margin:10px 0;
}

.premium-lock{
  opacity:0.5;
}

/* button */
button{
  padding:10px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

// ================= USER =================
if(!localStorage.getItem("role")){
  localStorage.setItem("role","free");
}

// ================= NAV =================
function nav(){
return `
<div class="nav">
<button onclick="showDashboard()">🏠</button>
<button onclick="showSignal()">📊</button>
<button onclick="showMateri()">📘</button>
<button onclick="showMember()">👑</button>
</div>`;
}

// ================= DASHBOARD =================
function showDashboard(){
app.innerHTML = `
<div class="container">
<h2>Trader X Academy</h2>
<p>Status: ${localStorage.getItem("role")}</p>

<div class="card">
🔥 Welcome bro, ini dashboard lu
</div>

<div class="card">
📊 Fokus: Forex / Crypto / Saham
</div>

</div>
${nav()}
`;
}

// ================= SIGNAL =================
let signals = [
{type:"forex",pair:"XAUUSD BUY",entry:2350,tp:2380,sl:2330,premium:false},
{type:"crypto",pair:"BTC BUY",entry:60000,tp:65000,sl:58000,premium:true},
{type:"saham",pair:"BBCA BUY",entry:9000,tp:9500,sl:8800,premium:true}
];

function showSignal(){
let html = `<div class="container"><h2>Signal</h2>`;

signals.reverse().forEach(s=>{

let locked = s.premium && localStorage.getItem("role")=="free";

html+=`
<div class="card ${locked?'premium-lock':''}">
<b>${locked?'🔒 Premium Only':s.pair}</b><br>
${locked?'':
`Entry: ${s.entry}<br>TP: ${s.tp}<br>SL: ${s.sl}`}
</div>
`;
});

html+=`</div>`+nav();
app.innerHTML = html;
}

// ================= MATERI (AMBIL DARI CODE LU) =================
function showMateri(){
app.innerHTML = `
<div class="container">
<h2>Materi</h2>

<div class="card">
📘 Dasar Blockchain
</div>

<div class="card premium-lock">
🔒 Smart Money Concept (Premium)
</div>

</div>
${nav()}
`;
}

// ================= MEMBER =================
function showMember(){
app.innerHTML = `
<div class="container">
<h2>Membership</h2>

<p>Status: ${localStorage.getItem("role")}</p>

<button onclick="upgrade()">Upgrade Premium</button>

</div>
${nav()}
`;
}

function upgrade(){
localStorage.setItem("role","premium");
alert("Lu sekarang premium 😈");
showMember();
}

// INIT
showDashboard();

</script>

</body>
</html>
