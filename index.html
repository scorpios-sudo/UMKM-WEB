<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trader X Academy | Premium Trading Platform</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0C10;
            font-family: 'Inter', sans-serif;
            color: #EFF3F8;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* mobile-first container */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: radial-gradient(circle at 20% 30%, #0F1219, #07090E);
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            position: relative;
        }

        /* scrollbar premium */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1A1F2A;
        }
        ::-webkit-scrollbar-thumb {
            background: #2A6DFF;
            border-radius: 12px;
        }

        /* bottom navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(12, 16, 24, 0.92);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 16px 20px;
            border-top: 1px solid rgba(42, 109, 255, 0.2);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: #8E9AAF;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .nav-item i {
            font-size: 22px;
        }
        .nav-item.active {
            color: #2A6DFF;
            text-shadow: 0 0 6px rgba(42,109,255,0.5);
            transform: translateY(-2px);
        }
        .page {
            display: none;
            padding: 20px 18px 30px;
            animation: fadeIn 0.25s ease;
        }
        .page.active-page {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Cards & UI */
        .card {
            background: rgba(20, 26, 36, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(42, 109, 255, 0.2);
            box-shadow: 0 12px 28px -8px rgba(0,0,0,0.5);
            transition: transform 0.15s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 32px -12px rgba(0,0,0,0.6);
            border-color: rgba(42, 109, 255, 0.4);
        }
        .glass-btn {
            background: linear-gradient(95deg, #1F2A44, #121A2A);
            border: none;
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .glass-btn.primary {
            background: linear-gradient(135deg, #2A6DFF, #0047CA);
            box-shadow: 0 4px 12px rgba(42,109,255,0.3);
        }
        .glass-btn.primary:hover {
            transform: scale(0.97);
            filter: brightness(1.05);
        }
        .badge {
            background: #2A6DFF20;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
            color: #6D9EFF;
        }
        .profit-text { color: #00E6B2; font-weight: 700; }
        .loss-text { color: #FF4D6D; font-weight: 700; }
        hr { border-color: #2A3448; margin: 12px 0; }

        /* horizontal scroll */
        .scroll-x {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            scroll-snap-type: x mandatory;
            padding-bottom: 8px;
        }
        .video-card, .news-card-mini {
            flex: 0 0 280px;
            background: #11161F;
            border-radius: 24px;
            overflow: hidden;
            scroll-snap-align: start;
            border: 1px solid #2A3A55;
        }
        iframe { width: 100%; height: 160px; border: none; }
        .signal-item, .journal-item, .news-item {
            background: #0E121C;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.1s;
        }
        .locked-signal {
            filter: blur(4px);
            background: #161C28;
            pointer-events: none;
            position: relative;
        }
        .lock-overlay {
            position: relative;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        /* toasts */
        .toast-msg {
            position: fixed;
            bottom: 90px;
            left: 20px;
            right: 20px;
            max-width: 460px;
            margin: 0 auto;
            background: #1E293B;
            backdrop-filter: blur(16px);
            border-left: 4px solid #2A6DFF;
            padding: 12px 16px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            z-index: 200;
            box-shadow: 0 8px 20px black;
            animation: slideUp 0.2s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
        button { background: none; border: none; cursor: pointer; }
        .upgrade-chip {
            background: #FFB34720;
            color: #FFB347;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #11161F;
            border-radius: 32px;
            width: 85%;
            max-width: 380px;
            padding: 24px;
            border: 1px solid #2A6DFF;
        }
        input, select {
            background: #0A0F18;
            border: 1px solid #2A3A55;
            padding: 12px 14px;
            border-radius: 24px;
            color: white;
            width: 100%;
            margin-top: 6px;
            margin-bottom: 14px;
            font-family: 'Inter', sans-serif;
        }
        .inline-icon { margin-right: 8px; }
        .watchlist-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1F2A3A; }
        .glow-text { text-shadow: 0 0 5px #2A6DFF; }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <!-- PAGES -->
    <div id="homePage" class="page active-page"></div>
    <div id="signalsPage" class="page"></div>
    <div id="journalPage" class="page"></div>
    <div id="newsPage" class="page"></div>
    <div id="profilePage" class="page"></div>

    <div class="bottom-nav">
        <button class="nav-item" data-page="home"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" data-page="signals"><i class="fas fa-chart-line"></i><span>Signals</span></button>
        <button class="nav-item" data-page="journal"><i class="fas fa-book-open"></i><span>Journal</span></button>
        <button class="nav-item" data-page="news"><i class="fas fa-newspaper"></i><span>News</span></button>
        <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></button>
    </div>
</div>

<script>
    // ---------- GLOBALS ----------
    let journalEntries = [];      // { id, pair, profitLoss, dateISO, timestamp }
    let isPremium = false;
    let userName = "Alex Trader";
    let userEmail = "alex@traderx.com";
    let balanceStarting = 10000; // simulated base
    let chartInstance = null;
    let activities = [];          // max 10 items
    let marketPrices = { BTC: 68250, GOLD: 2350, EURUSD: 1.0852 };
    let signalsArray = [];

    // ---------- DUMMY SIGNALS (Premium lock strategy) ----------
    function buildSignals() {
        return [
            { id: 1, pair: "BTC/USD", entry: 68400, tp: 69200, sl: 67800, status: "OPEN", createdAt: Date.now() - 86400000, premiumLocked: false },
            { id: 2, pair: "EUR/USD", entry: 1.0865, tp: 1.0920, sl: 1.0820, status: "WIN", createdAt: Date.now() - 172800000, premiumLocked: false },
            { id: 3, pair: "XAU/USD", entry: 2345, tp: 2360, sl: 2330, status: "OPEN", createdAt: Date.now() - 43200000, premiumLocked: false },
            { id: 4, pair: "ETH/USD", entry: 3210, tp: 3350, sl: 3150, status: "OPEN", createdAt: Date.now() - 21600000, premiumLocked: true },
            { id: 5, pair: "GBP/JPY", entry: 192.5, tp: 194.2, sl: 191.2, status: "LOSS", createdAt: Date.now() - 10800000, premiumLocked: true },
            { id: 6, pair: "SOL/USD", entry: 165.4, tp: 175.2, sl: 160.1, status: "WIN", createdAt: Date.now() - 3600000, premiumLocked: true },
        ];
    }

    // News data
    const newsData = [
        { id: 1, title: "Fed signals rate cut, crypto rallies", category: "Crypto", image: "https://picsum.photos/id/26/100/100", date: "2h ago", source: "Bloomberg" },
        { id: 2, title: "Gold hits new record amid inflation fears", category: "Gold", image: "https://picsum.photos/id/29/100/100", date: "5h ago", source: "Reuters" },
        { id: 3, title: "EURUSD volatility ahead of ECB", category: "Forex", image: "https://picsum.photos/id/35/100/100", date: "Yesterday", source: "FT" },
        { id: 4, title: "Bitcoin dominance rises to 52%", category: "Crypto", image: "https://picsum.photos/id/20/100/100", date: "3h ago", source: "Coindesk" },
        { id: 5, title: "Stocks mixed, tech earnings awaited", category: "Stocks", image: "https://picsum.photos/id/0/100/100", date: "1d ago", source: "WSJ" },
        { id: 6, title: "Oil prices decline, supply concerns ease", category: "Forex", image: "https://picsum.photos/id/42/100/100", date: "6h ago", source: "CNBC" }
    ];

    // Helper: load/save localStorage
    function loadStorage() {
        const storedJournal = localStorage.getItem("traderx_journal");
        if(storedJournal) journalEntries = JSON.parse(storedJournal);
        else {
            // sample demo trades for beautiful chart
            journalEntries = [
                { id: Date.now()+1, pair: "BTC/USD", profitLoss: 320, dateISO: new Date(Date.now() - 86400000*2).toISOString(), timestamp: Date.now() - 86400000*2 },
                { id: Date.now()+2, pair: "ETH/USD", profitLoss: -85, dateISO: new Date(Date.now() - 86400000).toISOString(), timestamp: Date.now() - 86400000 },
                { id: Date.now()+3, pair: "XAU/USD", profitLoss: 210, dateISO: new Date().toISOString(), timestamp: Date.now() }
            ];
            saveJournal();
        }
        const premiumStatus = localStorage.getItem("traderx_premium");
        isPremium = premiumStatus === "true";
        const savedName = localStorage.getItem("traderx_name");
        if(savedName) userName = savedName;
        const savedEmail = localStorage.getItem("traderx_email");
        if(savedEmail) userEmail = savedEmail;
        signalsArray = buildSignals();
        initActivitiesLog();
    }

    function saveJournal() { localStorage.setItem("traderx_journal", JSON.stringify(journalEntries)); }
    function setPremium(value) { isPremium = value; localStorage.setItem("traderx_premium", value); renderAllPages(); showToast(value ? "🎉 PREMIUM UNLOCKED! Full signals & insights" : "Free tier activated"); }
    function saveUserName(name) { userName = name; localStorage.setItem("traderx_name", name); renderProfilePage(); renderHomePage(); }

    function initActivitiesLog() {
        activities = ["📈 Welcome back! Ready for premium edge", "🎯 Winrate improving", "💡 New signal analysis available"];
        if(journalEntries.length) activities.unshift(`📊 ${journalEntries.length} trades logged`);
    }
    function addActivity(msg) { activities.unshift(msg); if(activities.length>8) activities.pop(); renderHomePage(); }

    // Real time market price update + activity
    function updateMarketPrices() {
        marketPrices.BTC += (Math.random() - 0.5) * 180;
        marketPrices.GOLD += (Math.random() - 0.5) * 8;
        marketPrices.EURUSD += (Math.random() - 0.5) * 0.002;
        marketPrices.BTC = Math.max(40000, marketPrices.BTC);
        marketPrices.GOLD = Math.max(2000, marketPrices.GOLD);
        if(Math.random() > 0.7) addActivity(`⚡ ${Object.keys(marketPrices)[Math.floor(Math.random()*3)]} moved sharply`); 
        renderWatchlistOnHome();
    }

    // ---------- CORE MATH ----------
    function getTotalPnL() { return journalEntries.reduce((sum, t) => sum + (t.profitLoss || 0), 0); }
    function getTodayPnL() {
        const todayStart = new Date(); todayStart.setHours(0,0,0,0);
        return journalEntries.filter(t => new Date(t.dateISO) >= todayStart).reduce((sum, t) => sum + t.profitLoss, 0);
    }
    function getWinRate() {
        if(journalEntries.length === 0) return 0;
        const wins = journalEntries.filter(t => t.profitLoss > 0).length;
        return (wins / journalEntries.length * 100).toFixed(1);
    }
    function getCurrentBalance() { return balanceStarting + getTotalPnL(); }

    // chart data from journal cumulative
    function getCumulativeBalanceData() {
        let sorted = [...journalEntries].sort((a,b) => a.timestamp - b.timestamp);
        let cumulative = balanceStarting;
        let points = [{label: 'Start', balance: cumulative}];
        sorted.forEach(t => { cumulative += t.profitLoss; points.push({label: t.pair, balance: cumulative}); });
        if(points.length === 1) points.push({label: 'Now', balance: cumulative});
        return points;
    }

    function updateBalanceChart() {
        const canvas = document.getElementById("balanceChartCanvas");
        if(!canvas) return;
        const ctx = canvas.getContext("2d");
        const dataPoints = getCumulativeBalanceData();
        const labels = dataPoints.map(p => p.label.length>8 ? p.label.slice(0,6) : p.label);
        const balances = dataPoints.map(p => p.balance);
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: labels, datasets: [{ label: 'Portfolio ($)', data: balances, borderColor: '#00E6B2', backgroundColor: 'rgba(0,230,178,0.05)', borderWidth: 3, pointRadius: 3, pointBackgroundColor: '#2A6DFF', tension: 0.3, fill: true }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#C0D0F0' } } }, scales: { y: { grid: { color: '#1F2A44' }, ticks: { color: '#ddd' } }, x: { ticks: { color: '#aaa' } } } }
        });
    }

    // Add trade logic
    function addTrade(pair, profitLossNum) {
        const newTrade = { id: Date.now(), pair: pair, profitLoss: profitLossNum, dateISO: new Date().toISOString(), timestamp: Date.now() };
        journalEntries.push(newTrade);
        saveJournal();
        addActivity(`📝 ${pair} ${profitLossNum>=0 ? '+' : ''}$${profitLossNum.toFixed(2)} recorded`);
        if(profitLossNum > 0) showToast(`✅ Profit +$${profitLossNum.toFixed(2)}`, "profit");
        else showToast(`⚠️ Loss $${Math.abs(profitLossNum).toFixed(2)}`, "loss");
        renderAllPages();
        updateBalanceChart();
    }
    function deleteTrade(id) {
        journalEntries = journalEntries.filter(t => t.id !== id);
        saveJournal();
        addActivity(`🗑️ Trade removed`);
        renderAllPages();
        updateBalanceChart();
    }

    // ---------- RENDER FUNCTIONS ----------
    function renderHomePage() {
        const homeDiv = document.getElementById("homePage");
        const balance = getCurrentBalance();
        const todayPnL = getTodayPnL();
        const totalPnL = getTotalPnL();
        const winrate = getWinRate();
        const premiumBadge = isPremium ? '<span class="badge" style="background:#FFB34720;color:#FFB347;">⭐ PREMIUM</span>' : '<span class="badge">🔓 FREE</span>';
        const visibleSignals = signalsArray.slice(0, 3).map(s => `<div class="signal-item"><span><b>${s.pair}</b> ${s.status}</span><span>${s.entry}</span></div>`).join('');
        const activityHtml = activities.slice(0,4).map(a => `<div class="flex-between"><span>🔔 ${a}</span></div>`).join('');
        homeDiv.innerHTML = `
            <div class="card"><div class="flex-between"><div><h2>Welcome back, ${userName}</h2>${premiumBadge}</div><i class="fas fa-chart-simple" style="font-size:28px;color:#2A6DFF;"></i></div></div>
            <div class="card"><div class="flex-between"><span>💰 Balance</span><span class="profit-text">$${balance.toFixed(2)}</span></div>
            <div class="flex-between"><span>📈 Profit Today</span><span class="${todayPnL>=0?'profit-text':'loss-text'}">${todayPnL>=0?'+':''}$${todayPnL.toFixed(2)}</span></div>
            <div class="flex-between"><span>📊 Total PnL</span><span class="${totalPnL>=0?'profit-text':'loss-text'}">${totalPnL>=0?'+':''}$${totalPnL.toFixed(2)}</span></div><hr>
            <div class="flex-between"><span>🏆 Winrate</span><span>${winrate}%</span></div></div>
            <div class="card"><canvas id="balanceChartCanvas" height="160" style="max-height:180px"></canvas></div>
            <div class="card"><div class="flex-between"><h3>🔥 Latest Signals</h3><button class="badge" id="gotoSignalsQuick">View all →</button></div>${visibleSignals || '<div>No signals</div>'}</div>
            <div class="card"><h3>📺 Trading Videos</h3><div class="scroll-x" id="videoFeedHome"></div></div>
            <div class="card"><h3>📰 Market News Preview</h3><div id="newsPreview"></div></div>
            <div class="card"><h3>⚡ Activity Feed</h3>${activityHtml}</div>
            <div class="grid-2"><button class="glass-btn primary" id="quickAddTradeBtn"><i class="fas fa-plus-circle"></i> Add Trade</button>
            <button class="glass-btn" id="quickSignalsBtn"><i class="fas fa-bullhorn"></i> Signals</button>
            <button class="glass-btn" id="quickCalcBtn"><i class="fas fa-calculator"></i> Calculator</button>
            <div id="watchlistMini" class="glass-btn" style="background:#121A2A;">📊 Watchlist</div></div>
        `;
        document.getElementById("quickAddTradeBtn")?.addEventListener("click", () => openAddTradeModal());
        document.getElementById("quickSignalsBtn")?.addEventListener("click", () => switchPage("signals"));
        document.getElementById("quickCalcBtn")?.addEventListener("click", () => openCalculatorModal());
        document.getElementById("gotoSignalsQuick")?.addEventListener("click", () => switchPage("signals"));
        renderVideoFeed("videoFeedHome");
        renderNewsPreview();
        renderWatchlistOnHome();
        updateBalanceChart();
    }
    function renderWatchlistOnHome() {
        const container = document.getElementById("watchlistMini");
        if(container) container.innerHTML = `<div><i class="fas fa-chart-line"></i> BTC: $${marketPrices.BTC.toFixed(0)} | GOLD: $${marketPrices.GOLD.toFixed(1)} | EUR: ${marketPrices.EURUSD.toFixed(4)}</div>`;
    }
    function renderVideoFeed(containerId) {
        const videos = ["dQw4w9WgXcQ", "JfVOs4VSpmA", "3nXLaO--DqM", "LDU_Txk06tM"];
        const container = document.getElementById(containerId);
        if(container) container.innerHTML = videos.map(id => `<div class="video-card"><iframe src="https://www.youtube.com/embed/${id}?autoplay=0&mute=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe><div class="p-2">Trading insight</div></div>`).join('');
    }
    function renderNewsPreview() {
        const previewDiv = document.getElementById("newsPreview");
        if(previewDiv) previewDiv.innerHTML = newsData.slice(0,2).map(n => `<div class="flex-between" style="margin-bottom:8px"><img src="${n.image}" width="40" height="40" style="border-radius:12px"><span><b>${n.title.slice(0,30)}</b><br><small>${n.source}</small></span></div>`).join('');
    }
    function renderSignalsPage() {
        const container = document.getElementById("signalsPage");
        let sorted = [...signalsArray].sort((a,b)=>b.createdAt - a.createdAt);
        let signalsHtml = sorted.map(sig => {
            const isLocked = sig.premiumLocked && !isPremium;
            if(isLocked) return `<div class="signal-item locked-signal" style="filter: blur(3px);"><div><i class="fas fa-lock"></i> ${sig.pair} 🔒</div><div>Premium signal</div></div>`;
            return `<div class="signal-item"><div><b>${sig.pair}</b><div><small>Entry:${sig.entry} TP:${sig.tp} SL:${sig.sl}</small></div></div><span class="badge">${sig.status}</span></div>`;
        }).join('');
        if(!isPremium) signalsHtml += `<div class="card" style="text-align:center"><i class="fas fa-crown"></i> <b>Upgrade to PREMIUM</b> for 5+ exclusive signals<br><button class="glass-btn primary" id="upgradeFromSignals">Upgrade Now</button></div>`;
        container.innerHTML = `<div class="card"><h2>📡 Trading Signals</h2><div>🔒 Premium unlocks hidden signals</div></div>${signalsHtml}`;
        document.getElementById("upgradeFromSignals")?.addEventListener("click", ()=>{ setPremium(true); renderSignalsPage(); });
    }
    function renderJournalPage() {
        const container = document.getElementById("journalPage");
        const totalTrades = journalEntries.length;
        const winrate = getWinRate();
        const totalPnl = getTotalPnL();
        let tradesList = journalEntries.slice().reverse().map(t => `<div class="journal-item"><div><b>${t.pair}</b> <span class="${t.profitLoss>=0?'profit-text':'loss-text'}">${t.profitLoss>=0?'+':''}$${t.profitLoss.toFixed(2)}</span><div><small>${new Date(t.dateISO).toLocaleDateString()}</small></div></div><button class="deleteTradeBtn" data-id="${t.id}"><i class="fas fa-trash-alt"></i></button></div>`).join('');
        container.innerHTML = `<div class="card"><div class="flex-between"><span>📊 Stats</span><span>Total trades: ${totalTrades}</span></div><div class="flex-between"><span>Win Rate: ${winrate}%</span><span>Total PnL: ${totalPnl>=0?'+':''}$${totalPnl.toFixed(2)}</span></div></div>
        <div class="card"><h3>➕ Add Trade</h3><input type="text" id="journalPair" placeholder="Pair (BTC/USD)" value="ETH/USD"><input type="number" id="journalPL" placeholder="Profit/Loss Amount"><button class="glass-btn primary" id="submitTradeBtn">Add to Journal</button></div>
        <div class="card"><h3>📜 Trade History</h3>${tradesList || 'No trades yet'}</div>`;
        document.getElementById("submitTradeBtn")?.addEventListener("click", ()=>{
            let pair = document.getElementById("journalPair").value;
            let pl = parseFloat(document.getElementById("journalPL").value);
            if(!pair || isNaN(pl)) { showToast("Invalid trade data"); return; }
            addTrade(pair, pl);
            renderJournalPage();
        });
        document.querySelectorAll(".deleteTradeBtn").forEach(btn => btn.addEventListener("click", (e) => { let id = parseInt(btn.dataset.id); deleteTrade(id); renderJournalPage(); }));
    }
    function renderNewsPage() {
        const container = document.getElementById("newsPage");
        let categories = ["All","Crypto","Forex","Gold","Stocks"];
        let filterButtons = categories.map(cat => `<button class="badge news-filter" data-cat="${cat}">${cat}</button>`).join(' ');
        container.innerHTML = `<div class="card"><h3>🎥 Video Hub</h3><div class="scroll-x" id="newsVideoScroll"></div></div><div class="card">📰 Category: ${filterButtons}</div><div id="newsListContainer"></div>`;
        renderVideoFeed("newsVideoScroll");
        function renderNewsByCategory(cat) {
            let filtered = cat === "All" ? newsData : newsData.filter(n => n.category === cat);
            const newsHtml = filtered.map(n => `<div class="news-item"><img src="${n.image}" width="50" height="50" style="border-radius:16px"><div style="flex:1; margin-left:12px"><b>${n.title}</b><br><small>${n.source} • ${n.date}</small></div></div>`).join('');
            document.getElementById("newsListContainer").innerHTML = newsHtml || '<div>No news</div>';
        }
        renderNewsByCategory("All");
        document.querySelectorAll(".news-filter").forEach(btn => btn.addEventListener("click", (e) => renderNewsByCategory(btn.dataset.cat)));
    }
    function renderProfilePage() {
        const container = document.getElementById("profilePage");
        container.innerHTML = `<div class="card" style="text-align:center"><i class="fas fa-user-circle fa-4x" style="color:#2A6DFF"></i><h2>${userName}</h2><p>${userEmail}</p><span class="badge">${isPremium ? "✨ PREMIUM MEMBER" : "FREE TIER"}</span></div>
        <div class="card"><label>Edit Name</label><input type="text" id="editNameInput" value="${userName}"><button class="glass-btn primary" id="saveNameBtn">Save Name</button><hr>
        <button class="glass-btn" id="upgradeProfileBtn"><i class="fas fa-gem"></i> ${isPremium ? "Already Premium" : "Upgrade to Premium"}</button>
        <button class="glass-btn" id="logoutBtn" style="margin-top:12px; background:#2A1A2A"><i class="fas fa-sign-out-alt"></i> Logout</button></div>`;
        document.getElementById("saveNameBtn")?.addEventListener("click", () => { let newName = document.getElementById("editNameInput").value; if(newName) saveUserName(newName); renderProfilePage(); renderHomePage(); });
        document.getElementById("upgradeProfileBtn")?.addEventListener("click", () => setPremium(true));
        document.getElementById("logoutBtn")?.addEventListener("click", () => { setPremium(false); saveUserName("TraderX"); userEmail = "guest@traderx.com"; localStorage.removeItem("traderx_name"); userName = "TraderX"; renderAllPages(); showToast("Logged out • free tier"); });
    }
    function openAddTradeModal() {
        const modalDiv = document.createElement("div"); modalDiv.className = "modal"; modalDiv.innerHTML = `<div class="modal-content"><h3>Add Trade</h3><input id="modalPair" placeholder="Pair"><input id="modalPL" type="number" placeholder="Profit/Loss $"><div class="flex-between"><button class="glass-btn" id="closeModal">Cancel</button><button class="glass-btn primary" id="confirmModalTrade">Add</button></div></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById("closeModal")?.addEventListener("click",()=>modalDiv.remove());
        document.getElementById("confirmModalTrade")?.addEventListener("click",()=>{ let p = document.getElementById("modalPair").value; let pl = parseFloat(document.getElementById("modalPL").value); if(p && !isNaN(pl)){ addTrade(p,pl); modalDiv.remove(); renderJournalPage(); } else showToast("Invalid"); });
    }
    function openCalculatorModal() {
        const modalDiv = document.createElement("div"); modalDiv.className = "modal"; modalDiv.innerHTML = `<div class="modal-content"><h3>⚖️ Risk Calculator</h3><label>Balance ($)</label><input id="calcBalance" value="${getCurrentBalance().toFixed(0)}"><label>Risk %</label><input id="calcRisk" value="1.5"><div>📐 Lot Size: <span id="lotResult">0.00</span> lots</div><button class="glass-btn" id="closeCalc">Close</button></div>`;
        document.body.appendChild(modalDiv);
        function updateLot(){ let bal = parseFloat(document.getElementById("calcBalance").value)||0; let risk = parseFloat(document.getElementById("calcRisk").value)||0; let lot = (bal * risk / 100) / 100000; document.getElementById("lotResult").innerText = lot.toFixed(3); }
        document.getElementById("calcBalance")?.addEventListener("input",updateLot);
        document.getElementById("calcRisk")?.addEventListener("input",updateLot);
        updateLot();
        document.getElementById("closeCalc")?.addEventListener("click",()=>modalDiv.remove());
    }
    function showToast(msg, type="info") { const toast = document.createElement("div"); toast.className = "toast-msg"; toast.innerHTML = `<i class="fas fa-bell"></i> ${msg}`; document.body.appendChild(toast); setTimeout(()=>toast.remove(), 2200); }
    function switchPage(pageId) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
        document.getElementById(`${pageId}Page`).classList.add("active-page");
        document.querySelectorAll(".nav-item").forEach(btn => btn.classList.remove("active"));
        document.querySelector(`.nav-item[data-page="${pageId}"]`).classList.add("active");
        if(pageId === "home") renderHomePage();
        if(pageId === "signals") renderSignalsPage();
        if(pageId === "journal") renderJournalPage();
        if(pageId === "news") renderNewsPage();
        if(pageId === "profile") renderProfilePage();
    }
    function renderAllPages() { renderHomePage(); renderSignalsPage(); renderJournalPage(); renderNewsPage(); renderProfilePage(); }
    loadStorage();
    renderAllPages();
    updateBalanceChart();
    setInterval(() => { updateMarketPrices(); renderWatchlistOnHome(); if(Math.random()>0.6) addActivity(`💹 Market update: BTC $${marketPrices.BTC.toFixed(0)}`); }, 4000);
    document.querySelectorAll(".nav-item").forEach(btn => btn.addEventListener("click", (e) => switchPage(btn.dataset.page)));
    window.switchPage = switchPage;
</script>
</body>
</html>
