<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader X Academy</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0B0F1C;
  color:white;
}
.container{padding:20px;padding-bottom:80px}
.card{
  background:#14182a;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button{
  flex:1;
  padding:15px;
  border:none;
  background:none;
  color:white;
}
input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}
.btn{
  background:#1f6fff;
  color:white;
  padding:10px;
  border:none;
  border-radius:10px;
}
.lock{opacity:0.4}
</style>
</head>

<body>

<div id="app"></div>

<script>

// ================= DATABASE =================
let users = JSON.parse(localStorage.getItem("users")||"[]");
let currentUser = JSON.parse(localStorage.getItem("currentUser")||"null");

if(!localStorage.getItem("signals")){
  localStorage.setItem("signals", JSON.stringify([]));
}
if(!localStorage.getItem("materi")){
  localStorage.setItem("materi", JSON.stringify([
    {title:"Dasar Trading",premium:false},
    {title:"Smart Money Concept",premium:true},
    {title:"Risk Management",premium:true}
  ]));
}

// ================= NAV =================
function nav(){
return `
<div class="nav">
<button onclick="dashboard()">🏠</button>
<button onclick="signal()">📊</button>
<button onclick="materi()">📘</button>
<button onclick="member()">👑</button>
</div>`;
}

// ================= AUTH =================
function showLogin(){
app.innerHTML=`
<div class="container">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password" type="password">
<button class="btn" onclick="login()">Login</button>
<p onclick="showRegister()">Belum punya akun?</p>
</div>`;
}

function showRegister(){
app.innerHTML=`
<div class="container">
<h2>Register</h2>
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<button class="btn" onclick="register()">Daftar</button>
<p onclick="showLogin()">Sudah punya akun?</p>
</div>`;
}

function register(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

users.push({email,pass,role:"free"});
localStorage.setItem("users",JSON.stringify(users));
alert("Akun dibuat!");
showLogin();
}

function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

let user = users.find(u=>u.email==email && u.pass==pass);
if(user){
  localStorage.setItem("currentUser",JSON.stringify(user));
  dashboard();
}else{
  alert("Login gagal");
}
}

// ================= DASHBOARD =================
function dashboard(){
currentUser = JSON.parse(localStorage.getItem("currentUser"));
if(!currentUser){return showLogin();}

app.innerHTML=`
<div class="container">
<h2>Trader X Academy</h2>

<div class="card">
User: ${currentUser.email}
</div>

<div class="card">
Status: ${currentUser.role}
</div>

<div class="card">
🔥 Target: Profit Konsisten
</div>

<button class="btn" onclick="logout()">Logout</button>

</div>
${nav()}
`;
}

function logout(){
localStorage.removeItem("currentUser");
showLogin();
}

// ================= SIGNAL =================
function signal(){
let data = JSON.parse(localStorage.getItem("signals"));
let html=`<div class="container">
<h2>Signal</h2>

<input id="pair" placeholder="Pair">
<input id="entry" placeholder="Entry">
<input id="tp" placeholder="TP">
<input id="sl" placeholder="SL">
<select id="status">
<option>RUNNING</option>
<option>TP HIT</option>
<option>SL HIT</option>
</select>
<label><input type="checkbox" id="premium"> Premium</label>
<button class="btn" onclick="addSignal()">Tambah</button>

<div id="list"></div>

</div>`+nav();

app.innerHTML=html;
renderSignal(data);
}

function renderSignal(data){
let list=document.getElementById("list");
list.innerHTML="";

data.slice().reverse().forEach((s,i)=>{
let lock = s.premium && currentUser.role=="free";

list.innerHTML+=`
<div class="card ${lock?'lock':''}">
<b>${lock?'🔒 Premium':s.pair}</b><br>
${lock?'':`Entry:${s.entry}<br>TP:${s.tp}<br>SL:${s.sl}<br>Status:${s.status}`}
<br>
<button onclick="deleteSignal(${i})">Hapus</button>
</div>`;
});
}

function addSignal(){
let data=JSON.parse(localStorage.getItem("signals"));

data.push({
pair:pair.value,
entry:entry.value,
tp:tp.value,
sl:sl.value,
status:status.value,
premium:premium.checked
});

localStorage.setItem("signals",JSON.stringify(data));
signal();
}

function deleteSignal(i){
let data=JSON.parse(localStorage.getItem("signals"));
data.splice(i,1);
localStorage.setItem("signals",JSON.stringify(data));
signal();
}

// ================= MATERI =================
function materi(){
let data=JSON.parse(localStorage.getItem("materi"));
let html=`<div class="container"><h2>Materi</h2>`;

data.forEach(m=>{
let lock = m.premium && currentUser.role=="free";

html+=`
<div class="card ${lock?'lock':''}">
${lock?'🔒 '+m.title:m.title}
</div>`;
});

html+=`</div>`+nav();
app.innerHTML=html;
}

// ================= MEMBER =================
function member(){
app.innerHTML=`
<div class="container">
<h2>Membership</h2>

<div class="card">
Status: ${currentUser.role}
</div>

<button class="btn" onclick="upgrade()">Upgrade Premium</button>

</div>
${nav()}
`;
}

function upgrade(){
currentUser.role="premium";
localStorage.setItem("currentUser",JSON.stringify(currentUser));

let users=JSON.parse(localStorage.getItem("users"));
users=users.map(u=>u.email==currentUser.email?currentUser:u);
localStorage.setItem("users",JSON.stringify(users));

alert("Sekarang Premium 😈");
member();
}

// ================= START =================
if(currentUser){
dashboard();
}else{
showLogin();
}

</script>

</body>
</html>
