<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0A0F1F">
    <title>Trader X Academy | Kalkulator Pro + Social Trading</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0A0F1F;
            color: #E2E8F0;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1E293B; }
        ::-webkit-scrollbar-thumb { background: #00FFAA; border-radius: 10px; }

        .app {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0F172A, #0A0F1F);
        }
        .page {
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container { padding: 20px 18px 30px; }

        /* Card glassmorphism */
        .card {
            background: rgba(18, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 170, 0.25);
            padding: 18px 20px;
            margin-bottom: 18px;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .card:hover {
            border-color: #00FFAA;
            transform: translateY(-2px);
        }
        .btn {
            border: none;
            border-radius: 44px;
            padding: 12px 20px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.15s;
        }
        .btn-primary {
            background: linear-gradient(95deg, #00FFAA, #00D4FF);
            color: #0A0F1F;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #00FFAA;
            color: #00FFAA;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            background: #0F1422;
            border: 1px solid #2D3A5E;
            border-radius: 28px;
            color: white;
            font-size: 14px;
            margin-bottom: 14px;
            outline: none;
        }
        input:focus { border-color: #00FFAA; }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .mt-2 { margin-top: 12px; }
        .mb-2 { margin-bottom: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }

        .quick-btn {
            background: linear-gradient(95deg, #1E2A47, #0F172A);
            border: 1px solid #00FFAA;
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        .quick-btn:active { transform: scale(0.97); }
        .stat-value { font-size: 28px; font-weight: 800; color: #00FFAA; }

        .market-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1E293B;
        }
        .up { color: #00FFAA; }
        .down { color: #FF4466; }

        /* Video Carousel */
        .video-carousel {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            scroll-snap-type: x mandatory;
            padding-bottom: 8px;
        }
        .video-carousel::-webkit-scrollbar { height: 3px; }
        .video-card {
            flex: 0 0 280px;
            scroll-snap-align: start;
            background: #111827;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(0,255,170,0.3);
        }
        .video-thumb iframe { width: 100%; height: 100%; border: none; }
        .video-info { padding: 12px; }
        .video-title { font-weight: 600; font-size: 14px; }

        /* News */
        .news-carousel {
            display: flex;
            overflow-x: auto;
            gap: 14px;
            padding-bottom: 8px;
        }
        .news-card {
            flex: 0 0 220px;
            background: #111827;
            border-radius: 28px;
            overflow: hidden;
        }
        .news-img { width: 100%; height: 120px; object-fit: cover; }
        .news-title { padding: 12px; font-size: 13px; }

        /* Activity */
        .activity-item {
            background: rgba(0,255,170,0.05);
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #00FFAA;
            font-size: 13px;
        }

        .edit-icon {
            cursor: pointer;
            background: #1E293B;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }
        .badge-premium { background: #00FFAA; color: #0A0F1F; }
        .badge { display: inline-flex; padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 600; }
        .toast {
            position: fixed;
            bottom: 90px;
            left: 20px;
            right: 20px;
            background: #1E293B;
            border-left: 4px solid #00FFAA;
            padding: 14px;
            border-radius: 28px;
            z-index: 1500;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #111827;
            border-radius: 36px;
            max-width: 90%;
            width: 380px;
            padding: 24px;
            border: 1px solid #00FFAA;
        }
        .profit-positive { color: #00FFAA; }
        .profit-negative { color: #FF4466; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(10, 15, 31, 0.96);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px 22px;
            border-top: 1px solid rgba(0,255,170,0.3);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: #7E8AA8;
            font-size: 11px;
            gap: 4px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .nav-item.active { color: #00FFAA; background: rgba(0,255,170,0.12); }
        .nav-item span:first-child { font-size: 22px; }

        /* Kalkulator hasil */
        .result-box {
            background: rgba(0,255,170,0.08);
            border-radius: 24px;
            padding: 14px;
            margin-top: 16px;
        }
        .profit-step {
            background: #111827;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .calc-label {
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }
    </style>
</head>
<body>
<div class="app" id="appRoot"></div>

<script>
    // ======================== STORAGE ========================
    const STORAGE = {
        USERS: "traderX_users",
        CURRENT: "traderX_current",
        SIGNALS: "traderX_signals",
        JOURNALS: "traderX_journals",
        ACTIVITIES: "traderX_activities"
    };

    const defaultSignals = [
        { id: "s1", pair: "BTC/USD", entry: "43200", tp: "45000", sl: "42500", status: "OPEN", premium: true, createdAt: Date.now() - 3600000 },
        { id: "s2", pair: "XAUUSD", entry: "1985", tp: "2000", sl: "1970", status: "WIN", premium: false, createdAt: Date.now() - 86400000 },
        { id: "s3", pair: "EUR/USD", entry: "1.0890", tp: "1.0950", sl: "1.0850", status: "LOSS", premium: false, createdAt: Date.now() - 172800000 }
    ];
    const defaultActivities = [
        { id: "act1", text: "🔥 Kamu profit +$20 di EURUSD", timestamp: Date.now() - 7200000 },
        { id: "act2", text: "📡 Signal BTC Aktif: Entry 43200", timestamp: Date.now() - 3600000 }
    ];

    function initStorage() {
        if (!localStorage.getItem(STORAGE.USERS)) {
            localStorage.setItem(STORAGE.USERS, JSON.stringify([
                { email: "demo@traderx.com", password: "demo123", name: "Demo Trader", role: "free", balance: 12500, profitToday: 340, totalTrades: 28, winrate: 64 }
            ]));
        }
        if (!localStorage.getItem(STORAGE.SIGNALS)) localStorage.setItem(STORAGE.SIGNALS, JSON.stringify(defaultSignals));
        if (!localStorage.getItem(STORAGE.JOURNALS)) localStorage.setItem(STORAGE.JOURNALS, JSON.stringify([]));
        if (!localStorage.getItem(STORAGE.ACTIVITIES)) localStorage.setItem(STORAGE.ACTIVITIES, JSON.stringify(defaultActivities));
    }
    initStorage();

    let currentUser = JSON.parse(localStorage.getItem(STORAGE.CURRENT));
    let currentPage = "home";
    let chartInstance = null;
    let balanceChartInstance = null;
    let liveInterval = null;

    function getUsers() { return JSON.parse(localStorage.getItem(STORAGE.USERS)); }
    function saveUser(user) {
        let users = getUsers();
        const idx = users.findIndex(u => u.email === user.email);
        if (idx !== -1) users[idx] = user;
        localStorage.setItem(STORAGE.USERS, JSON.stringify(users));
        localStorage.setItem(STORAGE.CURRENT, JSON.stringify(user));
        currentUser = user;
    }
    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${isError ? '⚠️ ' : '✅ '}${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2600);
    }
    function addActivity(text) {
        let acts = JSON.parse(localStorage.getItem(STORAGE.ACTIVITIES));
        acts.unshift({ id: Date.now(), text, timestamp: Date.now() });
        if (acts.length > 15) acts.pop();
        localStorage.setItem(STORAGE.ACTIVITIES, JSON.stringify(acts));
    }

    // ======================== RENDER ========================
    function render() {
        if (!currentUser) { renderAuth(); return; }
        const root = document.getElementById('appRoot');
        let content = '';
        switch (currentPage) {
            case 'home': content = renderHome(); break;
            case 'signals': content = renderSignals(); break;
            case 'journal': content = renderJournal(); break;
            case 'calculator': content = renderCalculator(); break;
            case 'education': content = renderEducation(); break;
            case 'membership': content = renderMembership(); break;
            case 'profile': content = renderProfile(); break;
            default: content = renderHome();
        }
        root.innerHTML = content + renderBottomNav();
        attachNavEvents();
        attachPageEvents();
        if (currentPage === 'home') {
            initChart();
            initBalanceChart();
            startLiveUpdates();
        } else {
            if (liveInterval) clearInterval(liveInterval);
        }
    }

    // ======================== AUTH ========================
    function renderAuth() {
        const root = document.getElementById('appRoot');
        root.innerHTML = `
            <div class="container" style="padding: 40px 20px;">
                <div class="card" style="text-align:center;">
                    <h1 style="font-size: 32px; background:linear-gradient(135deg,#00FFAA,#00D4FF); -webkit-background-clip:text; background-clip:text; color:transparent;">Trader X Academy</h1>
                    <p class="mt-2">Kalkulator Pro + Social Trading</p>
                </div>
                <div class="card" id="authBox">
                    <h3 id="authTitle">Login</h3>
                    <input type="text" id="authName" placeholder="Nama" style="display:none;">
                    <input type="email" id="authEmail" placeholder="Email">
                    <input type="password" id="authPass" placeholder="Password">
                    <button class="btn btn-primary" id="authBtn">Login</button>
                    <p class="flex-between mt-2"><a href="#" id="switchAuth" style="color:#00FFAA;">Belum punya akun? Daftar</a></p>
                    <p class="small" style="font-size:12px; text-align:center;">demo@traderx.com / demo123</p>
                </div>
            </div>
        `;
        let isLogin = true;
        const title = document.getElementById('authTitle');
        const btn = document.getElementById('authBtn');
        const switchLink = document.getElementById('switchAuth');
        const nameField = document.getElementById('authName');
        const emailInp = document.getElementById('authEmail');
        const passInp = document.getElementById('authPass');

        function handleAuth() {
            const email = emailInp.value.trim();
            const pass = passInp.value.trim();
            if (!email || !pass) return showToast("Isi semua field", true);
            const users = getUsers();
            if (isLogin) {
                const user = users.find(u => u.email === email && u.password === pass);
                if (user) {
                    localStorage.setItem(STORAGE.CURRENT, JSON.stringify(user));
                    currentUser = user;
                    showToast(`Selamat datang ${user.name}`);
                    render();
                } else showToast("Email atau password salah", true);
            } else {
                if (users.find(u => u.email === email)) return showToast("Email sudah terdaftar", true);
                const name = nameField.value.trim() || email.split('@')[0];
                const newUser = { email, password: pass, name, role: "free", balance: 5000, profitToday: 0, totalTrades: 0, winrate: 0 };
                users.push(newUser);
                localStorage.setItem(STORAGE.USERS, JSON.stringify(users));
                showToast("Registrasi berhasil, silakan login");
                isLogin = true;
                title.innerText = "Login";
                btn.innerText = "Login";
                switchLink.innerText = "Belum punya akun? Daftar";
                nameField.style.display = "none";
                emailInp.value = email;
                passInp.value = "";
            }
        }
        btn.onclick = handleAuth;
        switchLink.onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            title.innerText = isLogin ? "Login" : "Register";
            btn.innerText = isLogin ? "Login" : "Daftar";
            switchLink.innerText = isLogin ? "Belum punya akun? Daftar" : "Sudah punya akun? Login";
            nameField.style.display = isLogin ? "none" : "block";
        };
    }

    // ======================== HOME (INTERAKTIF) ========================
    function renderHome() {
        const journals = JSON.parse(localStorage.getItem(STORAGE.JOURNALS)).filter(j => j.userEmail === currentUser.email);
        const totalTrades = journals.length;
        const wins = journals.filter(j => j.profit > 0).length;
        const winrate = totalTrades ? ((wins / totalTrades) * 100).toFixed(0) : 0;
        currentUser.totalTrades = totalTrades;
        currentUser.winrate = parseInt(winrate);
        currentUser.profitToday = journals.filter(j => new Date(j.date).toDateString() === new Date().toDateString()).reduce((s,j)=>s+j.profit,0);
        saveUser(currentUser);

        const videos = [
            { title: "Smart Money Concept", channel: "Trader X", embed: "https://www.youtube.com/embed/dQw4w9WgXcQ" },
            { title: "Scalping Strategy", channel: "Pro Trader", embed: "https://www.youtube.com/embed/3JZ_D3ELwOQ" }
        ];
        const news = [
            { title: "Gold Menuju ATH", img: "https://picsum.photos/id/26/400/200" },
            { title: "BTC Dominance 52%", img: "https://picsum.photos/id/104/400/200" }
        ];
        let activities = JSON.parse(localStorage.getItem(STORAGE.ACTIVITIES)).slice(0, 5);

        return `
            <div class="container page">
                <div class="flex-between">
                    <div><h2>Welcome, ${currentUser.name}</h2><p>${currentUser.role === 'premium' ? '💎 Premium' : '🆓 Free'}</p></div>
                    <div class="badge ${currentUser.role === 'premium' ? 'badge-premium' : ''}">${currentUser.role.toUpperCase()}</div>
                </div>
                <div class="card">
                    <div class="flex-between">
                        <span>💰 Balance</span>
                        <span class="stat-value" id="balanceDisplay">$${currentUser.balance}</span>
                        <span class="edit-icon" id="editBalanceBtn">✏️ Edit</span>
                    </div>
                    <div class="flex-between"><span>📈 Today Profit</span><span class="${currentUser.profitToday>=0?'profit-positive':'profit-negative'}">$${currentUser.profitToday}</span></div>
                    <div class="flex-between"><span>📊 Total Trades</span><span>${currentUser.totalTrades}</span></div>
                    <div class="flex-between"><span>🏆 Winrate</span><span>${currentUser.winrate}%</span></div>
                </div>
                <div class="card">
                    <div class="flex-between"><span>📈 Balance History</span></div>
                    <canvas id="balanceHistoryChart" height="100"></canvas>
                </div>
                <div class="card">
                    <div class="flex-between"><span>🎥 Update & Edukasi Video</span></div>
                    <div class="video-carousel">
                        ${videos.map(v => `<div class="video-card"><div class="video-thumb"><iframe src="${v.embed}" frameborder="0"></iframe></div><div class="video-info"><div class="video-title">${v.title}</div><div class="video-channel">${v.channel}</div></div></div>`).join('')}
                    </div>
                </div>
                <div class="card">
                    <div class="flex-between"><span>🖼️ Market Update</span></div>
                    <div class="news-carousel">
                        ${news.map(n => `<div class="news-card"><img class="news-img" src="${n.img}"><div class="news-title">${n.title}</div></div>`).join('')}
                    </div>
                </div>
                <div class="card">
                    <div class="flex-between"><span>⚡ Aktivitas Terbaru</span></div>
                    <div id="activityFeed">${activities.map(act => `<div class="activity-item">${act.text}<br><span class="small">${new Date(act.timestamp).toLocaleTimeString()}</span></div>`).join('')}</div>
                </div>
                <div class="grid-2">
                    <div class="quick-btn" data-nav="calculator">🧮 Kalkulator</div>
                    <div class="quick-btn" data-nav="journal">📓 Jurnal</div>
                    <div class="quick-btn" data-nav="signals">📡 Signal</div>
                    <div class="quick-btn" data-nav="membership">👑 Upgrade</div>
                </div>
                <div class="card">
                    <div class="flex-between"><span>🌍 Market Snapshot (Live)</span><span id="liveMarketTime"></span></div>
                    <div id="liveMarketData">
                        <div class="market-item">BTC/USD <span class="up">+2.4%</span></div>
                        <div class="market-item">XAUUSD <span class="up">+0.8%</span></div>
                        <div class="market-item">EUR/USD <span class="down">-0.3%</span></div>
                    </div>
                </div>
            </div>
        `;
    }

    function initBalanceChart() {
        const ctx = document.getElementById('balanceHistoryChart')?.getContext('2d');
        if (!ctx) return;
        if (balanceChartInstance) balanceChartInstance.destroy();
        const journals = JSON.parse(localStorage.getItem(STORAGE.JOURNALS)).filter(j => j.userEmail === currentUser.email);
        journals.sort((a,b) => a.date - b.date);
        let profitPoints = [0];
        let labels = ['Start'];
        let sum = 0;
        journals.forEach((j, idx) => { sum += j.profit; profitPoints.push(sum); labels.push(`T${idx+1}`); });
        balanceChartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ label: 'Cumulative P&L', data: profitPoints, borderColor: '#00FFAA', backgroundColor: 'rgba(0,255,170,0.1)', tension: 0.3, fill: true }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
        });
    }
    function initChart() {} // dummy

    function startLiveUpdates() {
        if (liveInterval) clearInterval(liveInterval);
        liveInterval = setInterval(() => {
            const btc = (Math.random() * 3 - 1).toFixed(1);
            const gold = (Math.random() * 2 - 0.5).toFixed(1);
            const eur = (Math.random() * 2 - 1).toFixed(1);
            const marketDiv = document.getElementById('liveMarketData');
            if (marketDiv) marketDiv.innerHTML = `<div class="market-item">BTC/USD <span class="${btc>=0?'up':'down'}">${btc>=0?'+':''}${btc}%</span></div><div class="market-item">XAUUSD <span class="${gold>=0?'up':'down'}">${gold>=0?'+':''}${gold}%</span></div><div class="market-item">EUR/USD <span class="${eur>=0?'up':'down'}">${eur>=0?'+':''}${eur}%</span></div>`;
            const timeSpan = document.getElementById('liveMarketTime');
            if (timeSpan) timeSpan.innerText = new Date().toLocaleTimeString();
        }, 10000);
    }

    function attachBalanceEdit() {
        const editBtn = document.getElementById('editBalanceBtn');
        if (editBtn) editBtn.onclick = () => {
            let newBalance = prompt("Balance baru (USD):", currentUser.balance);
            if (newBalance && !isNaN(parseFloat(newBalance))) {
                currentUser.balance = parseFloat(newBalance);
                saveUser(currentUser);
                showToast("Balance diperbarui");
                render();
            }
        };
    }

    // ======================== KALKULATOR PRO (SESUAI GAMBAR) ========================
    function renderCalculator() {
        return `
            <div class="container page">
                <h2>🧮 Forex Calculator</h2>
                <div class="card">
                    <label class="calc-label">Account Balance (USD)</label>
                    <input type="number" id="calcBalance" value="100" step="1">
                    <label class="calc-label">Risk Percentage (%)</label>
                    <input type="number" id="calcRisk" value="20" step="0.5">
                    <label class="calc-label">Risk to Reward Ratio</label>
                    <input type="text" id="calcRR" value="1:4" placeholder="1:4">
                    <label class="calc-label">Stop Loss (pip)</label>
                    <input type="number" id="calcSL" value="10" step="1">
                    <label class="calc-label">Step (jumlah compounding)</label>
                    <input type="number" id="calcStep" value="6" step="1" min="1" max="20">
                    <button id="calcBtn" class="btn btn-primary mt-2">Calculate</button>
                    <div id="calcResults"></div>
                </div>
            </div>
        `;
    }

    function calculateForex() {
        let balance = parseFloat(document.getElementById('calcBalance').value);
        let riskPercent = parseFloat(document.getElementById('calcRisk').value);
        let rrInput = document.getElementById('calcRR').value;
        let slPip = parseFloat(document.getElementById('calcSL').value);
        let steps = parseInt(document.getElementById('calcStep').value);
        if (isNaN(balance) || isNaN(riskPercent) || isNaN(slPip) || isNaN(steps)) return;

        let rrMatch = rrInput.match(/(\d+):(\d+)/);
        let rewardRatio = rrMatch ? parseFloat(rrMatch[2]) / parseFloat(rrMatch[1]) : 4;
        let amountAtRisk = balance * (riskPercent / 100);
        let pipValue = amountAtRisk / slPip;
        let lots = pipValue / 10; // asumsi 1 lot = $10/pip untuk USD pair
        let netStopLoss = amountAtRisk;
        let netTakeProfit = amountAtRisk * rewardRatio;

        // Compounding steps
        let currentBalance = balance;
        let stepsHtml = '';
        for (let i = 1; i <= steps; i++) {
            let profitStep = currentBalance * (riskPercent / 100) * rewardRatio;
            let newBalance = currentBalance + profitStep;
            stepsHtml += `<div class="profit-step">Profit Step ${i}: ${profitStep.toFixed(2)} USD<br>Balance: ${newBalance.toFixed(2)} USD</div>`;
            currentBalance = newBalance;
        }
        let totalProfit = currentBalance - balance;

        const resultDiv = document.getElementById('calcResults');
        resultDiv.innerHTML = `
            <div class="result-box">
                <div class="flex-between"><span>Amount at Risk:</span><span>${amountAtRisk.toFixed(2)} USD</span></div>
                <div class="flex-between"><span>Pip Value:</span><span>${pipValue.toFixed(2)} USD</span></div>
                <div class="flex-between"><span>Lots:</span><span>${lots.toFixed(2)}</span></div>
                <div class="flex-between"><span>Net Stop Loss:</span><span>${netStopLoss.toFixed(2)} USD</span></div>
                <div class="flex-between"><span>Net Take Profit:</span><span>${netTakeProfit.toFixed(2)} USD</span></div>
            </div>
            <div class="result-box mt-2">
                <h4>📈 Compounding Steps (${steps}x)</h4>
                ${stepsHtml}
            </div>
            <div class="result-box mt-2">
                <div class="flex-between"><span>Total Profit after ${steps} steps:</span><span class="profit-positive">${totalProfit.toFixed(2)} USD</span></div>
                <div class="flex-between"><span>Final Balance:</span><span>${currentBalance.toFixed(2)} USD</span></div>
            </div>
            <div class="result-box mt-2">
                <h4>📊 Detailed Analysis</h4>
                <p>Risk per trade: ${riskPercent}% of balance<br>Risk-to-Reward: 1:${rewardRatio}<br>Compounding aktif menghasilkan growth eksponensial.</p>
                <h4>📅 Monthly Projections</h4>
                <p>Jika ${steps} step dalam sebulan, profit potensial: ~${(totalProfit * (30/steps)).toFixed(0)} USD</p>
                <h4>⚠️ Risk Metrics</h4>
                <p>Max Drawdown: ${(amountAtRisk/balance*100).toFixed(1)}% per trade<br>Disarankan risk ≤2% per trade.</p>
                <h4>💡 Trading Tips:</h4>
                <ul style="margin-left: 20px;"><li>Never risk more than 2% per trade</li><li>Consider reducing risk after consecutive losses</li><li>Monitor your maximum drawdown carefully</li><li>Adjust position size based on volatility</li></ul>
            </div>
        `;
    }

    // ======================== SIGNAL ========================
    function renderSignals() {
        let signals = JSON.parse(localStorage.getItem(STORAGE.SIGNALS));
        signals.sort((a,b) => b.createdAt - a.createdAt);
        return `<div class="container page"><h2>📡 Signal Trading</h2>${signals.map(s => `<div class="card"><div class="flex-between"><b>${s.pair}</b>${s.premium ? '<span class="badge-premium">PREMIUM</span>' : ''}</div><div>Entry: ${s.entry} | TP: ${s.tp} | SL: ${s.sl}</div><div>Status: ${s.status}</div></div>`).join('')}</div>`;
    }

    // ======================== JURNAL ========================
    function renderJournal() {
        let journals = JSON.parse(localStorage.getItem(STORAGE.JOURNALS)).filter(j => j.userEmail === currentUser.email);
        return `<div class="container page"><div class="flex-between"><h2>📓 Trading Journal</h2><button id="addJournalBtn" class="btn-primary" style="width:auto;">+</button></div><div id="journalList">${journals.slice().reverse().map(j => `<div class="card"><div class="flex-between"><b>${j.pair}</b><span class="${j.profit>=0?'profit-positive':'profit-negative'}">$${j.profit}</span></div><div class="small">${new Date(j.date).toLocaleString()}</div><button class="delJournal btn-outline" data-id="${j.id}">Hapus</button></div>`).join('')}</div></div>`;
    }
    function attachJournalEvents() {
        document.getElementById('addJournalBtn')?.addEventListener('click', () => {
            const modal = document.createElement('div'); modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><h3>New Trade</h3><input id="jPair" placeholder="Pair"><input id="jProfit" type="number" placeholder="Profit/Loss USD"><button id="saveJournal" class="btn-primary">Simpan</button><button id="closeJournal" class="btn-outline">Batal</button></div>`;
            document.body.appendChild(modal);
            document.getElementById('saveJournal').onclick = () => {
                let journals = JSON.parse(localStorage.getItem(STORAGE.JOURNALS));
                journals.push({ id: Date.now(), userEmail: currentUser.email, pair: document.getElementById('jPair').value, profit: parseFloat(document.getElementById('jProfit').value), date: Date.now() });
                localStorage.setItem(STORAGE.JOURNALS, JSON.stringify(journals));
                addActivity(`Trade ${document.getElementById('jPair').value} profit $${document.getElementById('jProfit').value}`);
                modal.remove(); render();
            };
            document.getElementById('closeJournal').onclick = () => modal.remove();
        });
        document.querySelectorAll('.delJournal').forEach(btn => btn.onclick = () => {
            let id = btn.dataset.id;
            let journals = JSON.parse(localStorage.getItem(STORAGE.JOURNALS));
            journals = journals.filter(j => j.id != id);
            localStorage.setItem(STORAGE.JOURNALS, JSON.stringify(journals));
            render();
        });
    }

    // ======================== LAINNYA ========================
    function renderEducation() { return `<div class="container page"><h2>📘 Edukasi</h2><div class="card">Forex Dasar</div><div class="card">Smart Money (Premium)</div></div>`; }
    function renderMembership() { return `<div class="container page"><h2>👑 Membership</h2><div class="card"><h3>${currentUser.role === 'premium' ? 'Premium' : 'Free'}</h3><button id="upgradeBtn" class="btn-primary">Upgrade</button></div></div>`; }
    function attachMembershipEvents() { document.getElementById('upgradeBtn')?.addEventListener('click', () => { currentUser.role = 'premium'; saveUser(currentUser); showToast("Premium aktif!"); render(); }); }
    function renderProfile() { return `<div class="container page"><h2>⚙️ Profile</h2><div class="card"><div>Nama: ${currentUser.name}</div><div>Email: ${currentUser.email}</div><button id="logoutBtn" class="btn-outline">Logout</button></div></div>`; }
    function attachProfileEvents() { document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem(STORAGE.CURRENT); currentUser = null; render(); }); }

    // ======================== NAVIGATION ========================
    function renderBottomNav() {
        const items = [
            { id: 'home', icon: '🏠', label: 'Home' },
            { id: 'signals', icon: '📊', label: 'Signal' },
            { id: 'journal', icon: '📓', label: 'Journal' },
            { id: 'calculator', icon: '🧮', label: 'Calc' },
            { id: 'profile', icon: '👤', label: 'Profile' }
        ];
        return `<div class="bottom-nav">${items.map(item => `<button class="nav-item ${currentPage === item.id ? 'active' : ''}" data-nav="${item.id}"><span>${item.icon}</span><span>${item.label}</span></button>`).join('')}</div>`;
    }

    function attachNavEvents() {
        document.querySelectorAll('[data-nav]').forEach(el => {
            el.addEventListener('click', (e) => { const nav = el.dataset.nav; if (nav) { currentPage = nav; render(); } });
        });
        if (currentPage === 'home') attachBalanceEdit();
        if (currentPage === 'journal') attachJournalEvents();
        if (currentPage === 'calculator') {
            document.getElementById('calcBtn')?.addEventListener('click', calculateForex);
            calculateForex();
        }
        if (currentPage === 'membership') attachMembershipEvents();
        if (currentPage === 'profile') attachProfileEvents();
    }
    function attachPageEvents() {}

    render();
</script>
</body>
</html>
